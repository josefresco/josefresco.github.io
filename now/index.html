    <style>
        .repo-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-top: 1.5rem;
        }

        .repo-item {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1.5rem;
            padding: 1rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);

        .repo-item:last-child { border-bottom: none; }

        .repo-main { flex: 1; min-width: 0; }

        .repo-name {

            margin-bottom: 0.2rem;

        .repo-desc {

            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

        .repo-meta {

            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
            font-size: 0.8rem;
            color: var(--text-muted);

        .repo-lang {

            align-items: center;
            gap: 0.3rem;
        }

        .lang-dot {
            width: 10px;

        .repo-updated { color: var(--text-muted); }

        .repos-header {
            display: flex;

            justify-content: space-between;

            margin-bottom: 0.5rem;

    <script>
    (function () {
        var LANG_COLORS = {
            JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
            PHP: '#4F5D95', HTML: '#e34c26', CSS: '#563d7c', Shell: '#89e051',
            Ruby: '#701516', Go: '#00ADD8', Rust: '#dea584', Vue: '#41b883',
            'Jupyter Notebook': '#DA5B0B'
        };

        function timeAgo(iso) {
            var diff = Math.floor((Date.now() - new Date(iso)) / 1000);
            if (diff < 60)   return 'just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            var days = Math.floor(diff / 86400);
            if (days < 30)  return days + 'd ago';
            if (days < 365) return Math.floor(days / 30) + 'mo ago';
            return Math.floor(days / 365) + 'y ago';
        }

        fetch('https://api.github.com/users/josefresco/repos?sort=pushed&direction=desc&per_page=15')
            .then(function (r) {
                if (!r.ok) throw new Error(r.status);
                return r.json();
            })
            .then(function (repos) {
                var listEl = document.getElementById('repo-list');
                // Filter out forks, keep repos pushed to at least once
                var active = repos.filter(function (r) { return !r.fork && r.pushed_at; });
                if (active.length === 0) {
                    listEl.innerHTML = '<div class="now-error">No repos found.</div>';
                    return;
                }
                listEl.innerHTML = '';
                active.forEach(function (repo) {
                    var a = document.createElement('a');
                    a.href = repo.html_url;
                    a.target = '_blank';
                    a.rel = 'noopener';
                    a.className = 'repo-item';

                    var langHtml = '';
                    if (repo.language) {
                        var color = LANG_COLORS[repo.language] || '#94a3b8';
                        langHtml = '<span class="repo-lang">' +
                            '<span class="lang-dot" style="background:' + color + '"></span>' +
                            repo.language +
                        '</span>';
                    }

                    a.innerHTML =
                        '<span class="repo-main">' +
                            '<span class="repo-name">' + repo.name + '</span>' +
                            (repo.description ? '<span class="repo-desc">' + repo.description + '</span>' : '') +
                        '</span>' +
                        '<span class="repo-meta">' +
                            langHtml +
                            '<span class="repo-updated">' + timeAgo(repo.pushed_at) + '</span>' +
                        '</span>';

                    listEl.appendChild(a);
                });
            })
            .catch(function () {
                document.getElementById('repo-list').innerHTML =
                    '<div class="now-error">Could not load repos — <a href="https://github.com/josefresco" target="_blank" rel="noopener" style="color:var(--neural-primary)">view on GitHub</a>.</div>';
            });
    })();
    </script>
