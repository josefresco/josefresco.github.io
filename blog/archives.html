    <style>
        /* Archives page styles */
        .archives-hero {
            padding: 120px 0 40px;
        }

        .archives-controls {
            padding: 0 0 20px;
        }

        .archives-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .archives-count {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .archives-count strong {
            color: var(--neural-primary);
        }

        .archives-filter {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .archives-filter label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .filter-select {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: var(--font-family);
            font-size: 0.875rem;
            cursor: pointer;
            transition: border-color var(--transition-fast);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--neural-primary);
        }

        /* Year divider */
        .year-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0 1rem;
        }

        .year-divider:first-child {
            margin-top: 0;
        }

        .year-label {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--neural-primary);
            white-space: nowrap;
        }

        .year-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(0, 212, 255, 0.3), transparent);
        }

        /* Archive list */
        .archives-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .archive-item {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 0 1.5rem;
            align-items: baseline;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            transition: background var(--transition-fast);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .archive-item:last-child {
            border-bottom: none;
        }

        .archive-item:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .archive-item:hover .archive-title {
            color: var(--neural-primary);
        }

        .archive-date {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .archive-body {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .archive-category {
            background: var(--btn-primary);
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            flex-shrink: 0;
        }

        .archive-title {
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.4;
            transition: color var(--transition-fast);
        }

        /* Empty state */
        .archives-empty {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-muted);
        }

        .archives-empty p {
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .archive-item {
                grid-template-columns: 1fr;
                gap: 0.25rem;
            }

            .archive-date {
                font-size: 0.75rem;
            }

            .archives-toolbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>

            { date: '2025-10-01', category: 'Browser Extension',      title: 'Save to My Blog: 2-Click WordPress Content Curation Chrome Extension',                                          url: '/blog/save-to-my-blog.html' },
            { date: '2025-09-01', category: 'IoT & Monitoring',       title: 'Building a Telegram Bot for Raspberry Pi Monitoring and Remote Control',                                        url: '/blog/telegram-pi-monitoring-bot.html' },
            { date: '2025-08-01', category: 'Browser Extension',      title: 'Quick IP Lookups with Browser Extensions',                                                                      url: '/blog/who-dis-ip-lookup.html' },
            { date: '2025-08-01', category: 'WordPress',              title: 'Simplifying WordPress PDF Management',                                                                          url: '/blog/easy-pdf-insert.html' },
            { date: '2025-08-01', category: 'WordPress',              title: 'Automated WordPress Backups Beyond Daily',                                                                      url: '/blog/wpengine-backup-scheduler.html' },
            { date: '2025-08-01', category: 'Time Tracking',          title: 'Building a Gamified Time Tracking Dashboard',                                                                   url: '/blog/breeze-time-tracker-dashboard.html' },
            { date: '2025-08-01', category: 'Browser Extension',      title: 'Curating Your Reddit Feed with Smart Filtering',                                                                url: '/blog/reddit-post-hider.html' },
            { date: '2025-08-01', category: 'Family Tech',            title: 'Creating a Shared Family Dashboard',                                                                            url: '/blog/family-dashboard.html' },
            { date: '2024-11-01', category: 'Browser Extension',      title: 'Reddit Post Hider v3.0: Major Refactor for Reliability',                                                        url: '/blog/reddit-post-hider-v3.html' },
        ];

        function formatDate(iso) {
            const [y, m, d] = iso.split('-');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return months[parseInt(m, 10) - 1] + ' ' + d + ', ' + y;
        }

        let filteredPosts = ALL_POSTS.slice();

        // Populate category filter
        const categories = [...new Set(ALL_POSTS.map(p => p.category))].sort();
        const select = document.getElementById('category-filter');
        categories.forEach(function (cat) {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            select.appendChild(opt);
        });

        select.addEventListener('change', function () {
            filteredPosts = this.value ? ALL_POSTS.filter(p => p.category === this.value) : ALL_POSTS.slice();
            render();
        });

        function render() {
            const total = filteredPosts.length;

            // Count
            const countEl = document.getElementById('archives-count');
            countEl.innerHTML = total === 0
                ? 'No posts found'
                : '<strong>' + total + '</strong> post' + (total === 1 ? '' : 's');

            // List
            const listEl = document.getElementById('archives-list');
            listEl.innerHTML = '';

            if (total === 0) {
                listEl.innerHTML = '<div class="archives-empty"><strong>No posts in this category.</strong><p>Try selecting a different filter above.</p></div>';
                return;
            }

            // Group by year
            const byYear = {};
            filteredPosts.forEach(function (post) {
                const year = post.date.split('-')[0];
                if (!byYear[year]) byYear[year] = [];
                byYear[year].push(post);
            });

            Object.keys(byYear).sort(function (a, b) { return b - a; }).forEach(function (year) {
                const divider = document.createElement('div');
                divider.className = 'year-divider';
                divider.innerHTML = '<span class="year-label">' + year + '</span><span class="year-line"></span>';
                listEl.appendChild(divider);

                byYear[year].forEach(function (post) {
                    const a = document.createElement('a');
                    a.href = post.url;
                    a.className = 'archive-item';
                    a.innerHTML =
                        '<span class="archive-date">' + formatDate(post.date) + '</span>' +
                        '<span class="archive-body">' +
                            '<span class="archive-category">' + post.category + '</span>' +
                            '<span class="archive-title">' + post.title + '</span>' +
                        '</span>';
                    listEl.appendChild(a);
                });
            });
        }

        render();
    })();
    </script>
