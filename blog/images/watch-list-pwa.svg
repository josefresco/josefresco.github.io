<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d29;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(26,29,41,0.9);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(42,45,58,0.9);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Neural network background pattern -->
  <g opacity="0.15">
    <circle cx="100" cy="100" r="2" fill="#00d4ff"/>
    <circle cx="300" cy="150" r="2" fill="#7c3aed"/>
    <circle cx="500" cy="100" r="2" fill="#00d4ff"/>
    <circle cx="700" cy="150" r="2" fill="#f59e0b"/>
    <circle cx="200" cy="300" r="2" fill="#7c3aed"/>
    <circle cx="400" cy="350" r="2" fill="#00d4ff"/>
    <circle cx="600" cy="300" r="2" fill="#f59e0b"/>
    <circle cx="150" cy="500" r="2" fill="#00d4ff"/>
    <circle cx="350" cy="550" r="2" fill="#7c3aed"/>
    <circle cx="550" cy="500" r="2" fill="#00d4ff"/>
    <circle cx="750" cy="550" r="2" fill="#f59e0b"/>
  </g>
  
  <!-- Main title -->
  <text x="400" y="70" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle">Watch List</text>
  <text x="400" y="100" font-family="Inter, Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">A Private JustWatch Alternative</text>
  
  <!-- PWA Badge -->
  <g transform="translate(340, 120)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="url(#accentGradient)" filter="url(#glow)"/>
    <text x="60" y="21" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">📱 PWA Ready</text>
  </g>
  
  <!-- App Interface Mockup -->
  <g transform="translate(100, 170)">
    <!-- Main app container -->
    <rect x="0" y="0" width="600" height="380" rx="12" fill="url(#cardGradient)" stroke="rgba(0,212,255,0.3)" stroke-width="1" filter="url(#shadow)"/>
    
    <!-- App header -->
    <rect x="0" y="0" width="600" height="60" rx="12" fill="rgba(0,212,255,0.1)"/>
    <rect x="0" y="48" width="600" height="12" fill="url(#cardGradient)"/>
    
    <!-- Search bar -->
    <rect x="20" y="15" width="400" height="30" rx="6" fill="rgba(255,255,255,0.1)"/>
    <text x="35" y="35" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Search movies &amp; TV shows...</text>
    
    <!-- Search icon -->
    <circle cx="430" cy="30" r="12" fill="rgba(0,212,255,0.2)"/>
    <path d="M426 26 L434 34 M434 26 L426 34" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Menu icon -->
    <g transform="translate(550, 20)">
      <rect x="0" y="0" width="24" height="4" rx="2" fill="#00d4ff"/>
      <rect x="0" y="8" width="24" height="4" rx="2" fill="#00d4ff"/>
      <rect x="0" y="16" width="24" height="4" rx="2" fill="#00d4ff"/>
    </g>
    
    <!-- Movie/TV cards grid -->
    <g transform="translate(20, 80)">
      <!-- Card 1 -->
      <rect x="0" y="0" width="170" height="220" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
      <rect x="0" y="0" width="170" height="140" rx="8" fill="rgba(0,212,255,0.1)"/>
      <text x="85" y="75" font-family="Inter, Arial, sans-serif" font-size="32" fill="#00d4ff" text-anchor="middle">🎬</text>
      <text x="10" y="160" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="600">Dune: Part Two</text>
      <text x="10" y="178" font-family="Inter, Arial, sans-serif" font-size="10" fill="#94a3b8">2024 • Sci-Fi</text>
      <rect x="10" y="190" width="50" height="20" rx="4" fill="rgba(124,58,237,0.3)"/>
      <text x="35" y="203" font-family="Inter, Arial, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Netflix</text>
      
      <!-- Card 2 -->
      <rect x="190" y="0" width="170" height="220" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
      <rect x="190" y="0" width="170" height="140" rx="8" fill="rgba(124,58,237,0.1)"/>
      <text x="275" y="75" font-family="Inter, Arial, sans-serif" font-size="32" fill="#7c3aed" text-anchor="middle">📺</text>
      <text x="200" y="160" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="600">The Bear S3</text>
      <text x="200" y="178" font-family="Inter, Arial, sans-serif" font-size="10" fill="#94a3b8">2024 • Drama</text>
      <rect x="200" y="190" width="50" height="20" rx="4" fill="rgba(0,212,255,0.3)"/>
      <text x="225" y="203" font-family="Inter, Arial, sans-serif" font-size="9" fill="#67e8f9" text-anchor="middle">Hulu</text>
      
      <!-- Card 3 -->
      <rect x="380" y="0" width="170" height="220" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
      <rect x="380" y="0" width="170" height="140" rx="8" fill="rgba(245,158,11,0.1)"/>
      <text x="465" y="75" font-family="Inter, Arial, sans-serif" font-size="32" fill="#f59e0b" text-anchor="middle">🎭</text>
      <text x="390" y="160" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="600">Oppenheimer</text>
      <text x="390" y="178" font-family="Inter, Arial, sans-serif" font-size="10" fill="#94a3b8">2023 • Biography</text>
      <rect x="390" y="190" width="60" height="20" rx="4" fill="rgba(0,212,255,0.3)"/>
      <text x="420" y="203" font-family="Inter, Arial, sans-serif" font-size="9" fill="#67e8f9" text-anchor="middle">Prime</text>
    </g>
    
    <!-- Bottom navigation -->
    <rect x="0" y="330" width="600" height="50" fill="rgba(0,0,0,0.3)"/>
    <rect x="0" y="330" width="600" height="1" fill="rgba(255,255,255,0.1)"/>
    
    <!-- Nav items -->
    <g transform="translate(50, 345)">
      <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="18" fill="#00d4ff">🏠</text>
      <text x="0" y="32" font-family="Inter, Arial, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle">Home</text>
    </g>
    <g transform="translate(200, 345)">
      <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">🔍</text>
      <text x="0" y="32" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Search</text>
    </g>
    <g transform="translate(350, 345)">
      <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">📋</text>
      <text x="0" y="32" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Watchlist</text>
    </g>
    <g transform="translate(500, 345)">
      <text x="0" y="12" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">⚙️</text>
      <text x="0" y="32" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Settings</text>
    </g>
  </g>
  
  <!-- Feature badges -->
  <g transform="translate(100, 570)">
    <rect x="0" y="0" width="140" height="24" rx="12" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)"/>
    <text x="70" y="16" font-family="Inter, Arial, sans-serif" font-size="11" fill="#67e8f9" text-anchor="middle">✓ No Ads</text>
  </g>
  <g transform="translate(250, 570)">
    <rect x="0" y="0" width="140" height="24" rx="12" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)"/>
    <text x="70" y="16" font-family="Inter, Arial, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">✓ No Tracking</text>
  </g>
  <g transform="translate(400, 570)">
    <rect x="0" y="0" width="140" height="24" rx="12" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)"/>
    <text x="70" y="16" font-family="Inter, Arial, sans-serif" font-size="11" fill="#fcd34d" text-anchor="middle">✓ TMDB API</text>
  </g>
  <g transform="translate(550, 570)">
    <rect x="0" y="0" width="140" height="24" rx="12" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)"/>
    <text x="70" y="16" font-family="Inter, Arial, sans-serif" font-size="11" fill="#67e8f9" text-anchor="middle">✓ Installable</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="550" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="750" cy="50" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="700" cy="550" r="2" fill="#f59e0b" opacity="0.5"/>
</svg>
