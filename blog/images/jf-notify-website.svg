<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0f"/>
      <stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="680" cy="60" r="80" fill="#7c3aed" opacity="0.07"/>
  <circle cx="120" cy="380" r="60" fill="#00d4ff" opacity="0.06"/>

  <!-- Source files column -->
  <g transform="translate(60,100)">
    <text x="0" y="-12" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="1">SOURCE</text>
    <!-- MD file -->
    <rect width="120" height="44" rx="8" fill="#1a1d29" stroke="#2a2d3a" stroke-width="1.5"/>
    <text x="12" y="17" font-family="monospace" font-size="11" fill="#00d4ff">index.md</text>
    <rect x="12" y="24" width="70" height="5" rx="2" fill="#2a2d3a"/>
    <rect x="12" y="32" width="55" height="5" rx="2" fill="#2a2d3a"/>

    <rect y="54" width="120" height="44" rx="8" fill="#1a1d29" stroke="#2a2d3a" stroke-width="1.5"/>
    <text x="12" y="71" font-family="monospace" font-size="11" fill="#00d4ff">pricing.md</text>
    <rect x="12" y="78" width="80" height="5" rx="2" fill="#2a2d3a"/>
    <rect x="12" y="86" width="60" height="5" rx="2" fill="#2a2d3a"/>

    <rect y="108" width="120" height="44" rx="8" fill="#1a1d29" stroke="#2a2d3a" stroke-width="1.5"/>
    <text x="12" y="125" font-family="monospace" font-size="11" fill="#f59e0b">layout.njk</text>
    <rect x="12" y="132" width="75" height="5" rx="2" fill="#2a2d3a"/>
    <rect x="12" y="140" width="50" height="5" rx="2" fill="#2a2d3a"/>

    <rect y="162" width="120" height="44" rx="8" fill="#1a1d29" stroke="#2a2d3a" stroke-width="1.5"/>
    <text x="12" y="179" font-family="monospace" font-size="11" fill="#7c3aed">.eleventy.js</text>
    <rect x="12" y="186" width="65" height="5" rx="2" fill="#2a2d3a"/>
    <rect x="12" y="194" width="90" height="5" rx="2" fill="#2a2d3a"/>
  </g>

  <!-- Arrows to build engine -->
  <g stroke="#00d4ff" stroke-width="1.5" opacity="0.6" fill="none">
    <line x1="182" y1="120" x2="300" y2="175"/>
    <line x1="182" y1="154" x2="300" y2="190"/>
    <line x1="182" y1="230" x2="300" y2="210"/>
    <line x1="182" y1="284" x2="300" y2="225"/>
    <polygon points="296,170 304,175 296,180" fill="#00d4ff" stroke="none" opacity="0.6"/>
    <polygon points="296,185 304,190 296,195" fill="#00d4ff" stroke="none" opacity="0.6"/>
    <polygon points="296,205 304,210 296,215" fill="#00d4ff" stroke="none" opacity="0.6"/>
    <polygon points="296,220 304,225 296,230" fill="#00d4ff" stroke="none" opacity="0.6"/>
  </g>

  <!-- Build engine (Eleventy) -->
  <rect x="300" y="155" width="200" height="100" rx="12" fill="#0f1117" stroke="url(#pill)" stroke-width="2"/>
  <text x="400" y="195" font-family="Inter,sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">11ty</text>
  <text x="400" y="218" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Static Site Generator</text>
  <text x="400" y="234" font-family="monospace" font-size="10" fill="#00d4ff" text-anchor="middle">npx @11ty/eleventy --build</text>

  <!-- Arrows to output -->
  <g stroke="#7c3aed" stroke-width="1.5" opacity="0.7" fill="none">
    <line x1="502" y1="185" x2="600" y2="148"/>
    <line x1="502" y1="205" x2="600" y2="205"/>
    <line x1="502" y1="225" x2="600" y2="265"/>
    <polygon points="596,143 604,148 596,153" fill="#7c3aed" stroke="none" opacity="0.7"/>
    <polygon points="596,200 604,205 596,210" fill="#7c3aed" stroke="none" opacity="0.7"/>
    <polygon points="596,260 604,265 596,270" fill="#7c3aed" stroke="none" opacity="0.7"/>
  </g>

  <!-- Output: browser window -->
  <rect x="600" y="100" width="160" height="105" rx="8" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
  <rect x="600" y="100" width="160" height="24" rx="8" fill="#1a1d29"/>
  <rect x="600" y="114" width="160" height="10" fill="#1a1d29"/>
  <circle cx="616" cy="112" r="4" fill="#ef4444"/>
  <circle cx="628" cy="112" r="4" fill="#f59e0b"/>
  <circle cx="640" cy="112" r="4" fill="#22c55e"/>
  <rect x="650" y="109" width="98" height="6" rx="3" fill="#2a2d3a"/>
  <!-- page content mockup -->
  <rect x="614" y="132" width="60" height="10" rx="3" fill="#00d4ff" opacity="0.8"/>
  <rect x="614" y="148" width="120" height="6" rx="2" fill="#2a2d3a"/>
  <rect x="614" y="158" width="100" height="6" rx="2" fill="#2a2d3a"/>
  <rect x="614" y="168" width="80" height="16" rx="4" fill="#7c3aed" opacity="0.6"/>
  <text x="654" y="180" font-family="Inter,sans-serif" font-size="8" fill="white" text-anchor="middle">Install Now</text>

  <!-- Output: HTML file -->
  <rect x="600" y="183" width="160" height="44" rx="8" fill="#1a1d29" stroke="#2a2d3a" stroke-width="1.5"/>
  <text x="614" y="200" font-family="monospace" font-size="11" fill="#22c55e">_site/index.html</text>
  <rect x="614" y="207" width="110" height="5" rx="2" fill="#2a2d3a"/>
  <rect x="614" y="216" width="85" height="5" rx="2" fill="#2a2d3a"/>

  <!-- Output: Deployed badge -->
  <rect x="600" y="245" width="160" height="44" rx="8" fill="#1a1d29" stroke="#2a2d3a" stroke-width="1.5"/>
  <text x="614" y="262" font-family="monospace" font-size="11" fill="#22c55e">✓ Deployed</text>
  <text x="614" y="278" font-family="monospace" font-size="10" fill="#94a3b8">jfnotify.com</text>

  <!-- Title -->
  <text x="400" y="390" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Building the JF Notify Marketing Site</text>
  <text x="400" y="414" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Eleventy · Nunjucks · Static-First</text>
</svg>
