<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d29;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="telegramGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0088cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005f8f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>
  
  <!-- Neural network background pattern -->
  <g opacity="0.2">
    <circle cx="100" cy="100" r="2" fill="#00d4ff"/>
    <circle cx="300" cy="150" r="2" fill="#7c3aed"/>
    <circle cx="500" cy="100" r="2" fill="#00d4ff"/>
    <circle cx="700" cy="150" r="2" fill="#f59e0b"/>
    <circle cx="200" cy="300" r="2" fill="#7c3aed"/>
    <circle cx="400" cy="350" r="2" fill="#00d4ff"/>
    <circle cx="600" cy="300" r="2" fill="#f59e0b"/>
    <circle cx="150" cy="500" r="2" fill="#00d4ff"/>
    <circle cx="350" cy="550" r="2" fill="#7c3aed"/>
    <circle cx="550" cy="500" r="2" fill="#00d4ff"/>
    <circle cx="750" cy="550" r="2" fill="#f59e0b"/>
  </g>
  
  <!-- Main title -->
  <text x="400" y="80" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle">JF Notify</text>
  <text x="400" y="115" font-family="Inter, Arial, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Instant Telegram Notifications</text>
  
  <!-- Launch badge -->
  <g transform="translate(340, 140)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="url(#accentGradient)" filter="url(#glow)"/>
    <text x="60" y="24" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">🚀 Live Now</text>
  </g>
  
  <!-- WordPress logo/icon -->
  <g transform="translate(150, 220)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="60" y="50" font-family="Inter, Arial, sans-serif" font-size="40" text-anchor="middle">📝</text>
    <text x="60" y="85" font-family="Inter, Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Gravity</text>
    <text x="60" y="105" font-family="Inter, Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Forms</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(320, 260)" filter="url(#glow)">
    <path d="M0,30 L80,30 M60,10 L80,30 L60,50" stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Telegram logo/icon -->
  <g transform="translate(450, 220)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="url(#telegramGradient)" filter="url(#glow)"/>
    <text x="60" y="50" font-family="Inter, Arial, sans-serif" font-size="40" text-anchor="middle">✈️</text>
    <text x="60" y="85" font-family="Inter, Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Telegram</text>
    <text x="60" y="105" font-family="Inter, Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Notified</text>
  </g>
  
  <!-- Connection line -->
  <path d="M270,280 Q400,280 450,280" stroke="url(#accentGradient)" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Feature boxes -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="180" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="90" y="35" font-family="Inter, Arial, sans-serif" font-size="24" text-anchor="middle">⚡</text>
    <text x="90" y="65" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Real-time</text>
    <text x="90" y="85" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Notifications</text>
    <text x="90" y="115" font-family="Inter, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">&lt;5s delivery</text>
  </g>
  
  <g transform="translate(310, 380)">
    <rect x="0" y="0" width="180" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="90" y="35" font-family="Inter, Arial, sans-serif" font-size="24" text-anchor="middle">🎯</text>
    <text x="90" y="65" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Field</text>
    <text x="90" y="85" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Mapping</text>
    <text x="90" y="115" font-family="Inter, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Custom templates</text>
  </g>
  
  <g transform="translate(520, 380)">
    <rect x="0" y="0" width="180" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="90" y="35" font-family="Inter, Arial, sans-serif" font-size="24" text-anchor="middle">🔧</text>
    <text x="90" y="65" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Conditional</text>
    <text x="90" y="85" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Logic</text>
    <text x="90" y="115" font-family="Inter, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Smart triggers</text>
  </g>
  
  <!-- Website URL at bottom -->
  <text x="400" y="570" font-family="Monaco, monospace" font-size="16" fill="#00d4ff" text-anchor="middle">jfnotify.com</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="550" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="750" cy="50" r="3" fill="#7c3aed" opacity="0.5"/>
  <circle cx="700" cy="550" r="2" fill="#f59e0b" opacity="0.5"/>
</svg>
