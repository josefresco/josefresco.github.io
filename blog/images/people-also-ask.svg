<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="People Also Ask Miner — question mining pipeline diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b0f"/>
      <stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)"/>
  <ellipse cx="150" cy="200" rx="200" ry="150" fill="rgba(124,58,237,0.08)"/>
  <ellipse cx="650" cy="300" rx="200" ry="150" fill="rgba(0,212,255,0.06)"/>

  <!-- Title -->
  <text x="400" y="46" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="url(#cyan)">People Also Ask Miner</text>
  <text x="400" y="68" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#94a3b8">Mine "People Also Ask" questions from Google SERP for content research</text>

  <!-- Step 1: Keyword Input -->
  <rect x="40" y="100" width="160" height="80" rx="12" fill="rgba(26,29,41,0.9)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="126" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#7c3aed">KEYWORD INPUT</text>
  <rect x="56" y="136" width="128" height="22" rx="5" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="120" y="151" text-anchor="middle" font-family="monospace" font-size="10" fill="#e2e8f0">"raspberry pi backup"</text>
  <text x="120" y="170" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">+ optional depth limit</text>

  <!-- Arrow 1→2 -->
  <line x1="202" y1="140" x2="240" y2="140" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Step 2: Scraper Engine -->
  <rect x="242" y="100" width="160" height="80" rx="12" fill="rgba(26,29,41,0.9)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="322" y="126" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#00d4ff">SCRAPER ENGINE</text>
  <text x="322" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">puppeteer / playwright</text>
  <text x="322" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">google.com/search?q=…</text>
  <text x="322" y="175" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">headless browser → DOM parse</text>

  <!-- Arrow 2→3 -->
  <line x1="404" y1="140" x2="442" y2="140" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Step 3: PAA Extractor -->
  <rect x="444" y="100" width="160" height="80" rx="12" fill="rgba(26,29,41,0.9)" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="524" y="126" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#00d4ff">PAA EXTRACTOR</text>
  <text x="524" y="145" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">querySelectorAll('.related')</text>
  <text x="524" y="160" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">deduplicate → queue</text>
  <text x="524" y="175" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">recursive expand (depth N)</text>

  <!-- Arrow 3→4 -->
  <line x1="606" y1="140" x2="644" y2="140" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>

  <!-- Step 4: Output -->
  <rect x="646" y="100" width="118" height="80" rx="12" fill="rgba(26,29,41,0.9)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="705" y="126" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#f59e0b">OUTPUT</text>
  <text x="705" y="144" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">questions.json</text>
  <text x="705" y="158" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">questions.csv</text>
  <text x="705" y="172" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">clipboard-ready</text>

  <!-- Sample question boxes -->
  <text x="40" y="216" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Mined Questions</text>
  <line x1="40" y1="222" x2="760" y2="222" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Q boxes row 1 -->
  <rect x="40" y="232" width="220" height="36" rx="8" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="52" y="248" font-family="Inter,sans-serif" font-size="10" fill="#00d4ff">?</text>
  <text x="66" y="248" font-family="Inter,sans-serif" font-size="10" fill="#e2e8f0">How do I backup a Raspberry Pi SD card?</text>
  <text x="66" y="261" font-family="Inter,sans-serif" font-size="9" fill="#64748b">depth 1 · 4 child questions</text>

  <rect x="272" y="232" width="220" height="36" rx="8" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="284" y="248" font-family="Inter,sans-serif" font-size="10" fill="#00d4ff">?</text>
  <text x="298" y="248" font-family="Inter,sans-serif" font-size="10" fill="#e2e8f0">What is the best offsite backup for Pi?</text>
  <text x="298" y="261" font-family="Inter,sans-serif" font-size="9" fill="#64748b">depth 1 · 6 child questions</text>

  <rect x="504" y="232" width="256" height="36" rx="8" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="516" y="248" font-family="Inter,sans-serif" font-size="10" fill="#00d4ff">?</text>
  <text x="530" y="248" font-family="Inter,sans-serif" font-size="10" fill="#e2e8f0">Does rsync work over SSH on Raspberry Pi?</text>
  <text x="530" y="261" font-family="Inter,sans-serif" font-size="9" fill="#64748b">depth 1 · 3 child questions</text>

  <!-- Q boxes row 2 (depth 2, slightly dimmer) -->
  <rect x="40" y="278" width="220" height="36" rx="8" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="52" y="294" font-family="Inter,sans-serif" font-size="10" fill="#7c3aed">?</text>
  <text x="66" y="294" font-family="Inter,sans-serif" font-size="10" fill="#cbd5e1">Can you backup Raspberry Pi to NAS?</text>
  <text x="66" y="307" font-family="Inter,sans-serif" font-size="9" fill="#475569">depth 2 · from Q1</text>

  <rect x="272" y="278" width="220" height="36" rx="8" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="284" y="294" font-family="Inter,sans-serif" font-size="10" fill="#7c3aed">?</text>
  <text x="298" y="294" font-family="Inter,sans-serif" font-size="10" fill="#cbd5e1">Is Backblaze B2 free for Raspberry Pi?</text>
  <text x="298" y="307" font-family="Inter,sans-serif" font-size="9" fill="#475569">depth 2 · from Q2</text>

  <rect x="504" y="278" width="256" height="36" rx="8" fill="rgba(124,58,237,0.06)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="516" y="294" font-family="Inter,sans-serif" font-size="10" fill="#7c3aed">?</text>
  <text x="530" y="294" font-family="Inter,sans-serif" font-size="10" fill="#cbd5e1">How to automate rsync with cron on Linux?</text>
  <text x="530" y="307" font-family="Inter,sans-serif" font-size="9" fill="#475569">depth 2 · from Q3</text>

  <!-- Stat bar -->
  <rect x="40" y="336" width="720" height="56" rx="10" fill="rgba(26,29,41,0.7)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="120" y="357" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#00d4ff">47</text>
  <text x="120" y="374" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">questions mined</text>

  <line x1="200" y1="344" x2="200" y2="384" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="310" y="357" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#7c3aed">3</text>
  <text x="310" y="374" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">depth levels</text>

  <line x1="400" y1="344" x2="400" y2="384" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="500" y="357" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#f59e0b">JSON + CSV</text>
  <text x="500" y="374" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">export formats</text>

  <line x1="600" y1="344" x2="600" y2="384" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="680" y="357" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="700" fill="#00d4ff">0</text>
  <text x="680" y="374" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#64748b">API keys required</text>

  <!-- CLI demo line -->
  <rect x="40" y="406" width="720" height="50" rx="8" fill="rgba(0,0,0,0.5)" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
  <text x="56" y="426" font-family="monospace" font-size="11" fill="#64748b">$</text>
  <text x="68" y="426" font-family="monospace" font-size="11" fill="#00d4ff">node index.js</text>
  <text x="180" y="426" font-family="monospace" font-size="11" fill="#f59e0b">--keyword</text>
  <text x="252" y="426" font-family="monospace" font-size="11" fill="#e2e8f0">"raspberry pi backup"</text>
  <text x="456" y="426" font-family="monospace" font-size="11" fill="#f59e0b">--depth</text>
  <text x="508" y="426" font-family="monospace" font-size="11" fill="#e2e8f0">3</text>
  <text x="56" y="446" font-family="monospace" font-size="10" fill="#475569">→ Saved 47 questions to questions.json and questions.csv</text>
</svg>
