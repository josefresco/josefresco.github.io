  <rect x="442" y="32" width="330" height="44" rx="14" fill="#0d0f14"/>
  <rect x="442" y="60" width="330" height="16" fill="#0d0f14"/>
  <circle cx="467" cy="54" r="5" fill="#ff5f57"/>
  <circle cx="485" cy="54" r="5" fill="#febc2e"/>
  <circle cx="503" cy="54" r="5" fill="#28c840"/>
  <text x="607" y="62" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="700" fill="#00d4ff">Extracted Questions (4)</text>

