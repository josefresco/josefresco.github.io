    <text x="12" y="20" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">Q1</text>
    <text x="32" y="20" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">What are the best free tools</text>
    <text x="32" y="35" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">for content research?</text>
    <rect x="12" y="44" width="50" height="3" rx="1.5" fill="#00d4ff" opacity="0.5"/>
  </g>
  <g transform="translate(30,258)">
    <rect width="215" height="52" rx="6" fill="#0f1117" stroke="#2a2d3a" stroke-width="1"/>
    <text x="12" y="20" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">Q2</text>
    <text x="32" y="20" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">How do bloggers find SEO</text>
    <text x="32" y="35" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">keywords for free?</text>
    <rect x="12" y="44" width="50" height="3" rx="1.5" fill="#7c3aed" opacity="0.5"/>
  </g>
  <g transform="translate(30,326)">
    <rect width="215" height="52" rx="6" fill="#0f1117" stroke="#2a2d3a" stroke-width="1"/>
    <text x="12" y="20" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">Q3</text>
    <text x="32" y="20" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">What is the People Also Ask</text>
    <text x="32" y="35" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">box on Google?</text>
    <rect x="12" y="44" width="50" height="3" rx="1.5" fill="#f59e0b" opacity="0.5"/>
  </g>

  <!-- Question cards - right column -->
  <g transform="translate(555,190)">
    <rect width="215" height="52" rx="6" fill="#0f1117" stroke="#2a2d3a" stroke-width="1"/>
    <text x="12" y="20" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">Q4</text>
    <text x="32" y="20" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">How do I use SerpApi for</text>
    <text x="32" y="35" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">content marketing?</text>
    <rect x="12" y="44" width="50" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
  </g>
  <g transform="translate(555,258)">
    <rect width="215" height="52" rx="6" fill="#0f1117" stroke="#2a2d3a" stroke-width="1"/>
    <text x="12" y="20" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">Q5</text>
    <text x="32" y="20" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">Can you mine PAA questions</text>
    <text x="32" y="35" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">automatically?</text>
    <rect x="12" y="44" width="50" height="3" rx="1.5" fill="#00d4ff" opacity="0.5"/>
  </g>
  <g transform="translate(555,326)">
    <rect width="215" height="52" rx="6" fill="#0f1117" stroke="#2a2d3a" stroke-width="1"/>
    <text x="12" y="20" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8">Q6</text>
    <text x="32" y="20" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">What questions do people ask</text>
    <text x="32" y="35" font-family="Inter,sans-serif" font-size="11" fill="#e2e8f0">about content strategy?</text>
    <rect x="12" y="44" width="50" height="3" rx="1.5" fill="#7c3aed" opacity="0.5"/>
  </g>

  <!-- Copy button -->
  <g transform="translate(310,393)">
    <rect width="180" height="32" rx="16" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
    <text x="90" y="21" font-family="Inter,sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">⎘  Copy All Questions</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(32,395)">
    <rect width="76" height="24" rx="12" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
    <text x="38" y="16" font-family="Inter,sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle">Node.js</text>
  </g>
  <g transform="translate(116,395)">
    <rect width="90" height="24" rx="12" fill="rgba(124,58,237,0.1)" stroke="#7c3aed" stroke-width="1"/>
    <text x="45" y="16" font-family="Inter,sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">Zero Deps</text>
  </g>
  <g transform="translate(214,395)">
    <rect width="72" height="24" rx="12" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1"/>
    <text x="36" y="16" font-family="Inter,sans-serif" font-size="10" fill="#22c55e" text-anchor="middle">SerpApi</text>
  </g>

  <text x="400" y="435" font-family="Inter,sans-serif" font-size="12" fill="#475569" text-anchor="middle">People Also Ask Miner · josefresco.com</text>
