  <text x="46" y="100" font-family="-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">People also ask</text>

  <!-- PAA row 1 -->
  <rect x="40" y="110" width="306" height="38" rx="7" fill="#0d1017" stroke="#1e2335" stroke-width="1"/>
  <text x="55" y="133" font-family="-apple-system,sans-serif" font-size="10.5" fill="#c8d0e0">How do you find content ideas using questions?</text>
  <text x="334" y="134" text-anchor="end" font-family="sans-serif" font-size="13" fill="#4a5568">▾</text>

  <!-- PAA row 2 — highlighted/active -->
  <rect x="40" y="152" width="306" height="38" rx="7" fill="#0f1520" stroke="#00d4ff" stroke-width="1.2"/>
  <text x="55" y="175" font-family="-apple-system,sans-serif" font-size="10.5" fill="#e2e8f0">What are People Also Ask questions in SEO?</text>
  <text x="334" y="176" text-anchor="end" font-family="sans-serif" font-size="13" fill="#00d4ff">▴</text>

  <!-- PAA row 3 -->
  <rect x="40" y="194" width="306" height="38" rx="7" fill="#0d1017" stroke="#1e2335" stroke-width="1"/>
  <text x="55" y="217" font-family="-apple-system,sans-serif" font-size="10.5" fill="#c8d0e0">How to extract PAA questions automatically?</text>
  <text x="334" y="218" text-anchor="end" font-family="sans-serif" font-size="13" fill="#4a5568">▾</text>

  <!-- PAA row 4 -->
  <rect x="40" y="236" width="306" height="38" rx="7" fill="#0d1017" stroke="#1e2335" stroke-width="1"/>
  <text x="55" y="259" font-family="-apple-system,sans-serif" font-size="10.5" fill="#c8d0e0">What tools help with keyword research questions?</text>
  <text x="334" y="260" text-anchor="end" font-family="sans-serif" font-size="13" fill="#4a5568">▾</text>

  <!-- See more -->
  <rect x="40" y="282" width="110" height="26" rx="6" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1"/>
  <text x="95" y="299" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="10" fill="#00d4ff">See more</text>

