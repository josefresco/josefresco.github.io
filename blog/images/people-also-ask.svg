<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="paa-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="paa-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0b0f;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#paa-bg)"/>
  <radialGradient id="glow1" cx="25%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.12"/>
    <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="75%" cy="30%" r="50%">
    <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.10"/>
    <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
  </radialGradient>
  <rect width="800" height="420" fill="url(#glow1)"/>
  <rect width="800" height="420" fill="url(#glow2)"/>

  <!-- LEFT PANEL: Google SERP mockup -->
  <rect x="28" y="32" width="330" height="356" rx="14" fill="#111318" stroke="#1e2130" stroke-width="1.5"/>

  <!-- Browser bar -->
  <rect x="28" y="32" width="330" height="40" rx="14" fill="#0d0f14"/>
  <rect x="28" y="58" width="330" height="14" fill="#0d0f14"/>
  <circle cx="52" cy="52" r="5" fill="#ff5f57"/>
  <circle cx="70" cy="52" r="5" fill="#febc2e"/>
  <circle cx="88" cy="52" r="5" fill="#28c840"/>
  <rect x="108" y="44" width="230" height="16" rx="8" fill="#1a1d29"/>
  <text x="223" y="56" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">content ideas for blog posts</text>
  <text x="328" y="56" text-anchor="end" font-family="sans-serif" font-size="10" fill="#00d4ff">⌕</text>

