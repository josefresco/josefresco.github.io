  <rect x="40" y="330" width="148" height="30" rx="8" fill="url(#paa-grad)"/>
  <text x="114" y="350" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="600" fill="#fff">▶ Run Bookmarklet</text>

