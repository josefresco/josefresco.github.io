<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0f"/>
      <stop offset="100%" style="stop-color:#1a1d29"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(26,29,41,0.9)"/>
      <stop offset="100%" style="stop-color:rgba(26,29,41,0.6)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bgGrad)"/>

  <!-- Background radial glow effects -->
  <circle cx="150" cy="210" r="200" fill="rgba(124,58,237,0.06)"/>
  <circle cx="650" cy="120" r="180" fill="rgba(0,212,255,0.06)"/>

  <!-- Title area -->
  <text x="50" y="58" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#00d4ff" letter-spacing="2" text-anchor="start" filter="url(#subtleGlow)">CONTENT RESEARCH TOOL</text>
  <text x="50" y="92" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="start">people-also-ask</text>
  <text x="50" y="116" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#94a3b8" text-anchor="start">Mining Google's question graph for content ideas</text>

  <!-- Divider line -->
  <line x1="50" y1="134" x2="400" y2="134" stroke="url(#primaryGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Search bar mock-up -->
  <rect x="50" y="150" width="340" height="38" rx="8" fill="rgba(26,29,41,0.9)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <circle cx="73" cy="169" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="79" y1="175" x2="83" y2="179" stroke="#00d4ff" stroke-width="1.5" opacity="0.8"/>
  <text x="92" y="174" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#94a3b8">How does content SEO work?</text>
  <rect x="355" y="155" width="28" height="28" rx="6" fill="url(#primaryGrad)" opacity="0.9"/>
  <text x="369" y="173" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">→</text>

  <!-- PAA Question cards (staggered) -->
  <!-- Card 1 -->
  <rect x="50" y="204" width="340" height="36" rx="7" fill="rgba(26,29,41,0.85)" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>
  <rect x="50" y="204" width="4" height="36" rx="2" fill="url(#primaryGrad)"/>
  <text x="65" y="219" font-family="Inter, -apple-system, sans-serif" font-size="11.5" font-weight="500" fill="#ffffff">What is a People Also Ask box?</text>
  <text x="65" y="234" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Depth: 1 — 4 related questions found</text>

  <!-- Card 2 -->
  <rect x="50" y="246" width="340" height="36" rx="7" fill="rgba(26,29,41,0.85)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>
  <rect x="50" y="246" width="4" height="36" rx="2" fill="#7c3aed"/>
  <text x="65" y="261" font-family="Inter, -apple-system, sans-serif" font-size="11.5" font-weight="500" fill="#ffffff">How do I optimize for featured snippets?</text>
  <text x="65" y="276" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Depth: 2 — 3 related questions found</text>

  <!-- Card 3 -->
  <rect x="50" y="288" width="340" height="36" rx="7" fill="rgba(26,29,41,0.85)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <rect x="50" y="288" width="4" height="36" rx="2" fill="#f59e0b"/>
  <text x="65" y="303" font-family="Inter, -apple-system, sans-serif" font-size="11.5" font-weight="500" fill="#ffffff">What makes a good pillar page?</text>
  <text x="65" y="318" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#94a3b8">Depth: 3 — 5 related questions found</text>

  <!-- Card 4 (partially visible) -->
  <rect x="50" y="330" width="340" height="36" rx="7" fill="rgba(26,29,41,0.85)" stroke="rgba(0,212,255,0.15)" stroke-width="1" opacity="0.6"/>
  <rect x="50" y="330" width="4" height="36" rx="2" fill="url(#primaryGrad)" opacity="0.6"/>
  <text x="65" y="345" font-family="Inter, -apple-system, sans-serif" font-size="11.5" font-weight="500" fill="#ffffff" opacity="0.6">How long should a blog post be for SEO?</text>

  <!-- Fade out gradient at bottom of cards -->
  <rect x="50" y="340" width="340" height="54" fill="url(#bgGrad)" opacity="0.7" rx="4"/>

  <!-- Right side: Code / output panel -->
  <rect x="432" y="140" width="320" height="255" rx="10" fill="rgba(26,29,41,0.9)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Editor dots -->
  <circle cx="452" cy="158" r="5" fill="#ff5f57"/>
  <circle cx="467" cy="158" r="5" fill="#ffbd2e"/>
  <circle cx="482" cy="158" r="5" fill="#28c840"/>
  <text x="500" y="163" font-family="monospace" font-size="10" fill="#94a3b8">output.json</text>

  <!-- Code content -->
  <line x1="432" y1="172" x2="752" y2="172" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="448" y="191" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">1</text>
  <text x="466" y="191" font-family="'Courier New', monospace" font-size="10.5" fill="#00d4ff">{</text>

  <text x="448" y="208" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">2</text>
  <text x="466" y="208" font-family="'Courier New', monospace" font-size="10.5" fill="#f59e0b">  "query"</text>
  <text x="523" y="208" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">:</text>
  <text x="532" y="208" font-family="'Courier New', monospace" font-size="10.5" fill="#4ade80"> "content SEO"</text>
  <text x="628" y="208" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">,</text>

  <text x="448" y="225" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">3</text>
  <text x="466" y="225" font-family="'Courier New', monospace" font-size="10.5" fill="#f59e0b">  "depth"</text>
  <text x="514" y="225" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">:</text>
  <text x="523" y="225" font-family="'Courier New', monospace" font-size="10.5" fill="#7c3aed"> 3</text>
  <text x="532" y="225" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">,</text>

  <text x="448" y="242" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">4</text>
  <text x="466" y="242" font-family="'Courier New', monospace" font-size="10.5" fill="#f59e0b">  "questions"</text>
  <text x="538" y="242" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">: [</text>

  <text x="448" y="259" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">5</text>
  <text x="466" y="259" font-family="'Courier New', monospace" font-size="10.5" fill="#4ade80">    "What is PAA?"</text>

  <text x="448" y="276" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">6</text>
  <text x="466" y="276" font-family="'Courier New', monospace" font-size="10.5" fill="#4ade80">    "How to get snippets?"</text>

  <text x="448" y="293" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">7</text>
  <text x="466" y="293" font-family="'Courier New', monospace" font-size="10.5" fill="#4ade80">    "What is pillar page?"</text>

  <text x="448" y="310" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">8</text>
  <text x="466" y="310" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">    ...</text>

  <text x="448" y="327" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">9</text>
  <text x="466" y="327" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">  ]</text>

  <text x="448" y="344" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">10</text>
  <text x="469" y="344" font-family="'Courier New', monospace" font-size="10.5" fill="#f59e0b">  "total"</text>
  <text x="515" y="344" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">:</text>
  <text x="524" y="344" font-family="'Courier New', monospace" font-size="10.5" fill="#7c3aed"> 23</text>

  <text x="448" y="361" font-family="'Courier New', monospace" font-size="10.5" fill="#94a3b8">11</text>
  <text x="469" y="361" font-family="'Courier New', monospace" font-size="10.5" fill="#00d4ff">}</text>

  <!-- Stats bar at bottom -->
  <rect x="50" y="378" width="702" height="30" rx="8" fill="rgba(26,29,41,0.7)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Stats -->
  <circle cx="76" cy="393" r="5" fill="#00d4ff" opacity="0.9" filter="url(#subtleGlow)"/>
  <text x="88" y="397" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8">23 questions mined</text>

  <circle cx="222" cy="393" r="5" fill="#7c3aed" opacity="0.9"/>
  <text x="234" y="397" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8">Depth: 3 levels</text>

  <circle cx="348" cy="393" r="5" fill="#f59e0b" opacity="0.9"/>
  <text x="360" y="397" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8">BFS traversal</text>

  <circle cx="472" cy="393" r="5" fill="#4ade80" opacity="0.9"/>
  <text x="484" y="397" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8">JSON &amp; CSV export</text>

  <circle cx="608" cy="393" r="5" fill="#00d4ff" opacity="0.5"/>
  <text x="620" y="397" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8">github.com/josefresco</text>
</svg>
