  <line x1="374" y1="208" x2="424" y2="208" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="422,203 434,208 422,213" fill="#00d4ff"/>
  <circle cx="399" cy="208" r="26" fill="rgba(0,212,255,0.07)" stroke="#00d4ff" stroke-width="1.2"/>
