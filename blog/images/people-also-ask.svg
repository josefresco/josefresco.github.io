<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0f"/>
      <stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="150" cy="380" r="200" fill="#00d4ff" opacity="0.03"/>
  <circle cx="650" cy="80" r="180" fill="#7c3aed" opacity="0.04"/>

  <!-- Search bar at top center -->
  <g transform="translate(200,28)">
    <rect width="400" height="42" rx="21" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <text x="60" y="27" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8">content research tools for bloggers</text>
    <circle cx="30" cy="21" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="36" y1="27" x2="42" y2="33" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Arrow down from search to PAA box -->
  <line x1="400" y1="70" x2="400" y2="105" stroke="#2a2d3a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="400,110 396,103 404,103" fill="#2a2d3a"/>

  <!-- Center PAA engine box -->
  <g transform="translate(265,112)">
    <rect width="270" height="44" rx="6" fill="rgba(0,212,255,0.08)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="135" y="19" font-family="Inter,sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" font-weight="600" letter-spacing="0.08em">PEOPLE ALSO ASK MINER</text>
    <text x="135" y="34" font-family="Inter,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">paa-server.js  ·  port 3131  ·  SerpApi</text>
  </g>

  <!-- Left connector line -->
  <line x1="265" y1="134" x2="180" y2="134" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="134" x2="180" y2="215" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="215" x2="245" y2="215" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="283" x2="245" y2="283" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="351" x2="245" y2="351" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Right connector line -->
  <line x1="535" y1="134" x2="620" y2="134" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="620" y1="134" x2="620" y2="215" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="620" y1="215" x2="555" y2="215" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="620" y1="283" x2="555" y2="283" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="620" y1="351" x2="555" y2="351" stroke="#2a2d3a" stroke-width="1" stroke-dasharray="4,3"/>

