  <text x="460" y="100" font-family="monospace" font-size="10" fill="#7c3aed">[</text>
  <text x="472" y="117" font-family="monospace" font-size="10" fill="#64748b">{</text>
  <text x="484" y="133" font-family="monospace" font-size="10" fill="#94a3b8">"question":</text>
  <text x="484" y="148" font-family="monospace" font-size="9.5" fill="#86efac">  "How do you find content ideas..."</text>
  <text x="472" y="163" font-family="monospace" font-size="10" fill="#64748b">},</text>

  <text x="472" y="178" font-family="monospace" font-size="10" fill="#64748b">{</text>
  <text x="484" y="193" font-family="monospace" font-size="10" fill="#94a3b8">"question":</text>
  <text x="484" y="208" font-family="monospace" font-size="9.5" fill="#86efac">  "What are People Also Ask questions..."</text>
  <text x="472" y="223" font-family="monospace" font-size="10" fill="#64748b">},</text>

  <text x="472" y="238" font-family="monospace" font-size="10" fill="#64748b">{</text>
  <text x="484" y="253" font-family="monospace" font-size="10" fill="#94a3b8">"question":</text>
  <text x="484" y="268" font-family="monospace" font-size="9.5" fill="#86efac">  "How to extract PAA questions..."</text>
  <text x="472" y="283" font-family="monospace" font-size="10" fill="#64748b">},</text>

  <text x="472" y="298" font-family="monospace" font-size="10" fill="#64748b">{</text>
  <text x="484" y="313" font-family="monospace" font-size="9.5" fill="#86efac">  "What tools help with keyword research..."</text>
  <text x="472" y="328" font-family="monospace" font-size="10" fill="#64748b">}</text>
  <text x="460" y="343" font-family="monospace" font-size="10" fill="#7c3aed">]</text>

  <!-- Export buttons -->
  <rect x="458" y="352" width="72" height="24" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="494" y="369" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9.5" fill="#00d4ff">Copy JSON</text>
  <rect x="538" y="352" width="60" height="24" rx="6" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="1"/>
  <text x="568" y="369" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9.5" fill="#00d4ff">Copy CSV</text>
  <rect x="606" y="352" width="64" height="24" rx="6" fill="rgba(124,58,237,0.15)" stroke="#7c3aed" stroke-width="1"/>
  <text x="638" y="369" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9.5" fill="#c4b5fd">Copy Text</text>

  <!-- Bottom caption -->
  <text x="400" y="406" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" fill="#4a5568">people-also-ask — Mine Google's question boxes for content research</text>
</svg>
