<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0f"/><stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
    <linearGradient id="wpblue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#0077aa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- WP sites on left -->
  <g transform="translate(40,70)">
    <text x="75" y="-8" font-family="Inter,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle" letter-spacing="1" font-weight="600">WP ENGINE SITES</text>
    <!-- Site 1 -->
    <rect width="150" height="50" rx="8" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <circle cx="22" cy="25" r="10" fill="#21759b"/>
    <text x="22" y="29" font-family="serif" font-size="12" fill="white" text-anchor="middle" font-weight="700">W</text>
    <text x="45" y="20" font-family="monospace" font-size="10" fill="#00d4ff">site-alpha.com</text>
    <text x="45" y="34" font-family="monospace" font-size="9" fill="#22c55e">● online</text>
    <!-- Site 2 -->
    <rect y="60" width="150" height="50" rx="8" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <circle cx="22" cy="85" r="10" fill="#21759b"/>
    <text x="22" y="89" font-family="serif" font-size="12" fill="white" text-anchor="middle" font-weight="700">W</text>
    <text x="45" y="80" font-family="monospace" font-size="10" fill="#00d4ff">site-beta.com</text>
    <text x="45" y="94" font-family="monospace" font-size="9" fill="#22c55e">● online</text>
    <!-- Site 3 -->
    <rect y="120" width="150" height="50" rx="8" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <circle cx="22" cy="145" r="10" fill="#21759b"/>
    <text x="22" y="149" font-family="serif" font-size="12" fill="white" text-anchor="middle" font-weight="700">W</text>
    <text x="45" y="140" font-family="monospace" font-size="10" fill="#00d4ff">site-gamma.com</text>
    <text x="45" y="154" font-family="monospace" font-size="9" fill="#f59e0b">⚠ update avail</text>
    <!-- Site 4 -->
    <rect y="180" width="150" height="50" rx="8" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <circle cx="22" cy="205" r="10" fill="#21759b"/>
    <text x="22" y="209" font-family="serif" font-size="12" fill="white" text-anchor="middle" font-weight="700">W</text>
    <text x="45" y="200" font-family="monospace" font-size="10" fill="#00d4ff">site-delta.com</text>
    <text x="45" y="214" font-family="monospace" font-size="9" fill="#22c55e">● online</text>
  </g>

  <!-- Connecting lines to helper plugin -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.4" stroke-dasharray="5,4">
    <line x1="192" y1="118" x2="300" y2="188"/>
    <line x1="192" y1="158" x2="300" y2="205"/>
    <line x1="192" y1="218" x2="300" y2="222"/>
    <line x1="192" y1="278" x2="300" y2="240"/>
  </g>

  <!-- WPE Central Command Helper plugin (middle) -->
  <rect x="300" y="160" width="200" height="110" rx="12" fill="#0f1117" stroke="#7c3aed" stroke-width="2"/>
  <text x="400" y="192" font-family="Inter,sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="600">wpe-central-command</text>
  <text x="400" y="208" font-family="Inter,sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="600">-helper.php</text>
  <rect x="320" y="218" width="160" height="20" rx="4" fill="#1a1d29"/>
  <text x="400" y="232" font-family="monospace" font-size="9" fill="#00d4ff" text-anchor="middle">REST /wp-json/wpe-cc/v1/</text>
  <text x="400" y="252" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">plugins · themes · stats</text>

  <!-- Connecting lines to dashboard -->
  <g stroke="#7c3aed" stroke-width="1.5" opacity="0.6">
    <line x1="502" y1="215" x2="555" y2="215"/>
    <polygon points="551,210 559,215 551,220" fill="#7c3aed" stroke="none"/>
  </g>

  <!-- WPE Central Command dashboard (right) -->
  <rect x="560" y="80" width="200" height="270" rx="12" fill="#0f1117" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="560" y="80" width="200" height="32" rx="12" fill="#1a1d29"/>
  <rect x="560" y="100" width="200" height="12" fill="#1a1d29"/>
  <text x="660" y="101" font-family="Inter,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">WPE Central Command</text>
  <!-- Dashboard rows -->
  <g transform="translate(575,125)">
    <rect width="170" height="28" rx="4" fill="#1a1d29"/>
    <rect x="4" y="8" width="8" height="8" rx="2" fill="#21759b"/>
    <text x="18" y="18" font-family="monospace" font-size="9" fill="#00d4ff">site-alpha.com</text>
    <text x="120" y="18" font-family="monospace" font-size="9" fill="#22c55e">v6.5.3</text>

    <rect y="32" width="170" height="28" rx="4" fill="#1a1d29"/>
    <rect x="4" y="40" width="8" height="8" rx="2" fill="#21759b"/>
    <text x="18" y="50" font-family="monospace" font-size="9" fill="#00d4ff">site-beta.com</text>
    <text x="120" y="50" font-family="monospace" font-size="9" fill="#22c55e">v6.5.3</text>

    <rect y="64" width="170" height="28" rx="4" fill="#1a1d29"/>
    <rect x="4" y="72" width="8" height="8" rx="2" fill="#21759b"/>
    <text x="18" y="82" font-family="monospace" font-size="9" fill="#00d4ff">site-gamma.com</text>
    <text x="120" y="82" font-family="monospace" font-size="9" fill="#f59e0b">v6.4.1</text>

    <rect y="96" width="170" height="28" rx="4" fill="#1a1d29"/>
    <rect x="4" y="104" width="8" height="8" rx="2" fill="#21759b"/>
    <text x="18" y="114" font-family="monospace" font-size="9" fill="#00d4ff">site-delta.com</text>
    <text x="120" y="114" font-family="monospace" font-size="9" fill="#22c55e">v6.5.3</text>

    <rect y="134" width="170" height="26" rx="4" fill="#7c3aed" opacity="0.15"/>
    <text x="85" y="151" font-family="monospace" font-size="9" fill="#7c3aed" text-anchor="middle">Bulk Update Available →</text>
  </g>

  <text x="400" y="393" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">WPE Central Command</text>
  <text x="400" y="416" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Multi-Site WordPress Fleet Dashboard</text>
</svg>
