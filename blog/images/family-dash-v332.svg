<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0f"/>
      <stop offset="100%" style="stop-color:#1a1d29"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,212,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(124,58,237,0.05)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:rgba(0,212,255,0.2)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:rgba(124,58,237,0.2)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="200" cy="200" rx="300" ry="300" fill="url(#orb1)" opacity="0.5"/>
  <ellipse cx="1000" cy="430" rx="280" ry="280" fill="url(#orb2)" opacity="0.5"/>

  <!-- Grid dots -->
  <g opacity="0.08">
    <circle cx="100" cy="100" r="1.5" fill="#00d4ff"/>
    <circle cx="200" cy="100" r="1.5" fill="#00d4ff"/>
    <circle cx="300" cy="100" r="1.5" fill="#00d4ff"/>
    <circle cx="100" cy="200" r="1.5" fill="#00d4ff"/>
    <circle cx="200" cy="200" r="1.5" fill="#00d4ff"/>
    <circle cx="1000" cy="100" r="1.5" fill="#7c3aed"/>
    <circle cx="1100" cy="100" r="1.5" fill="#7c3aed"/>
    <circle cx="1000" cy="200" r="1.5" fill="#7c3aed"/>
    <circle cx="1100" cy="200" r="1.5" fill="#7c3aed"/>
    <circle cx="1000" cy="500" r="1.5" fill="#7c3aed"/>
    <circle cx="1100" cy="500" r="1.5" fill="#7c3aed"/>
  </g>

  <!-- Version badge -->
  <rect x="80" y="60" width="120" height="32" rx="16" fill="url(#accent)" opacity="0.9"/>
  <text x="140" y="81" font-family="Inter, -apple-system, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">v3.32</text>

  <!-- Main title -->
  <text x="80" y="145" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white">Family Dashboard</text>
  <text x="80" y="205" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="400" fill="url(#accent)">Service Workers &amp; Offline Caching</text>

  <!-- Subtitle line -->
  <rect x="80" y="225" width="60" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="80" y="265" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#94a3b8">Keeping your wall display running through reboots and network blips</text>

  <!-- Dashboard mockup card - weather widget -->
  <rect x="80" y="310" width="240" height="140" rx="12" fill="url(#card)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="104" y="345" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#94a3b8">WEATHER</text>
  <text x="104" y="390" font-family="Inter, -apple-system, sans-serif" font-size="42" fill="white">72°</text>
  <text x="104" y="420" font-family="Inter, -apple-system, sans-serif" font-size="13" fill="#00d4ff">Cached · 2 min ago</text>
  <!-- Wifi off icon hint -->
  <text x="280" y="345" font-family="Inter, -apple-system, sans-serif" font-size="18" fill="#f59e0b">⚡</text>

  <!-- Calendar widget -->
  <rect x="340" y="310" width="240" height="140" rx="12" fill="url(#card)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="364" y="345" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#94a3b8">UPCOMING</text>
  <text x="364" y="375" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="white">Doctor Appt 2pm</text>
  <text x="364" y="398" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="white">Soccer Practice 4pm</text>
  <text x="364" y="421" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="white">Grocery run 6pm</text>
  <text x="364" y="440" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#7c3aed">● Serving from cache</text>

  <!-- Service worker flow diagram -->
  <rect x="600" y="290" width="500" height="290" rx="16" fill="rgba(26,29,41,0.6)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Title inside card -->
  <text x="625" y="325" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">SERVICE WORKER CACHE FLOW</text>

  <!-- iPad -->
  <rect x="625" y="345" width="80" height="55" rx="6" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.5)" stroke-width="1.5"/>
  <text x="665" y="365" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle">iPad</text>
  <text x="665" y="382" font-family="Inter, -apple-system, sans-serif" font-size="18" text-anchor="middle">📱</text>

  <!-- Arrow right -->
  <line x1="715" y1="372" x2="750" y2="372" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="750,368 758,372 750,376" fill="#94a3b8"/>

  <!-- SW Cache box -->
  <rect x="758" y="345" width="90" height="55" rx="6" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.5)" stroke-width="1.5"/>
  <text x="803" y="365" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">SW Cache</text>
  <text x="803" y="383" font-family="Inter, -apple-system, sans-serif" font-size="18" text-anchor="middle">💾</text>

  <!-- Arrow right -->
  <line x1="857" y1="372" x2="892" y2="372" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="892,368 900,372 892,376" fill="#94a3b8"/>

  <!-- Express server -->
  <rect x="900" y="345" width="90" height="55" rx="6" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.4)" stroke-width="1.5"/>
  <text x="945" y="365" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Pi Server</text>
  <text x="945" y="383" font-family="Inter, -apple-system, sans-serif" font-size="18" text-anchor="middle">🖥️</text>

  <!-- Stale-while-revalidate label -->
  <text x="803" y="420" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">stale-while-revalidate</text>
  <line x1="625" y1="415" x2="990" y2="415" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Offline scenario -->
  <text x="625" y="450" font-family="Inter, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">OFFLINE FALLBACK</text>
  <rect x="625" y="465" width="360" height="40" rx="6" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="640" y="481" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f59e0b">⚡ Pi offline</text>
  <text x="640" y="497" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8">→ SW intercepts → serves cached shell + data</text>

  <!-- systemd badge -->
  <rect x="625" y="520" width="155" height="36" rx="6" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="637" y="535" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#00d4ff">systemd service</text>
  <text x="637" y="549" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#94a3b8">auto-start on boot</text>

  <rect x="790" y="520" width="155" height="36" rx="6" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
  <text x="802" y="535" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#7c3aed">restart=always</text>
  <text x="802" y="549" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#94a3b8">crash recovery</text>

  <!-- Bottom author line -->
  <text x="80" y="490" font-family="Inter, -apple-system, sans-serif" font-size="14" fill="#94a3b8">josefresco.com · May 2026</text>

  <!-- Tags -->
  <rect x="80" y="510" width="110" height="26" rx="13" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="135" y="527" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle">Raspberry Pi</text>

  <rect x="200" y="510" width="130" height="26" rx="13" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="265" y="527" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle">Service Worker</text>

  <rect x="340" y="510" width="90" height="26" rx="13" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="385" y="527" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">Offline</text>

  <rect x="440" y="510" width="80" height="26" rx="13" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="480" y="527" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Node.js</text>

  <!-- Bottom gradient bar -->
  <rect x="0" y="615" width="1200" height="15" fill="url(#accent)" opacity="0.6"/>
</svg>
