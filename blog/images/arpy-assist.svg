<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .bg { fill: #0a0b0f; }
      .text-primary { fill: #ffffff; }
      .text-secondary { fill: #94a3b8; }
      .text-muted { fill: #64748b; }
      .neural-primary { fill: #00d4ff; }
      .neural-secondary { fill: #7c3aed; }
      .neural-accent { fill: #f59e0b; }
      .browser-bg { fill: rgba(26, 29, 41, 0.9); }
      .browser-header { fill: rgba(42, 45, 58, 0.8); }
      .btn-primary { fill: url(#grad1); }
      .btn-secondary { fill: rgba(255, 255, 255, 0.1); }
      .line { stroke-linecap: round; }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" class="bg"/>

  <!-- Neural Network Background -->
  <g opacity="0.3">
    <circle cx="50" cy="50" r="3" class="neural-primary" />
    <circle cx="150" cy="350" r="2" class="neural-secondary" />
    <circle cx="750" cy="80" r="3" class="neural-primary" />
    <circle cx="680" cy="340" r="2" class="neural-secondary" />
    <circle cx="400" cy="200" r="4" class="neural-accent" />
    <path d="M 50 50 Q 200 100 400 200" stroke="url(#grad1)" stroke-width="1" fill="none" class="line"/>
    <path d="M 750 80 Q 600 150 400 200" stroke="url(#grad1)" stroke-width="1" fill="none" class="line"/>
    <path d="M 150 350 Q 250 280 400 200" stroke="url(#grad1)" stroke-width="1" fill="none" class="line" stroke-dasharray="5 5"/>
    <path d="M 680 340 Q 550 270 400 200" stroke="url(#grad1)" stroke-width="1" fill="none" class="line" stroke-dasharray="5 5"/>
  </g>
  
  <!-- Browser Window -->
  <g transform="translate(100, 60)">
    <rect width="600" height="280" rx="12" class="browser-bg" stroke="#ffffff" stroke-opacity="0.1"/>
    
    <!-- Browser Header -->
    <rect width="600" height="40" rx="12" ry="12" class="browser-header"/>
    <g transform="translate(15, 12)">
      <circle cx="6" cy="6" r="6" fill="#ff5f57"/>
      <circle cx="28" cy="6" r="6" fill="#ffbd2e"/>
      <circle cx="50" cy="6" r="6" fill="#28ca42"/>
    </g>
    <text x="300" y="27" class="text-secondary" text-anchor="middle" font-size="14">arpy.colewebdev.com</text>

    <!-- Web Interface Content -->
    <g transform="translate(20, 55)">
      <!-- Chat Input Area -->
      <rect width="560" height="60" rx="8" fill="rgba(0, 212, 255, 0.1)" stroke="#00d4ff" stroke-opacity="0.3"/>
      <text x="20" y="35" class="text-muted" font-size="14">Clone safe-share and add a joke to README...</text>
      
      <!-- Smart Buttons -->
      <g transform="translate(0, 80)">
        <rect width="130" height="36" rx="6" class="btn-secondary"/>
        <text x="65" y="23" text-anchor="middle" class="text-primary" font-size="13">📁 My Repos</text>
        
        <rect x="140" width="130" height="36" rx="6" class="btn-secondary"/>
        <text x="205" y="23" text-anchor="middle" class="text-primary" font-size="13">🔧 Fix something</text>
        
        <rect x="280" width="130" height="36" rx="6" class="btn-secondary"/>
        <text x="345" y="23" text-anchor="middle" class="text-primary" font-size="13">📝 Update docs</text>
        
        <rect x="420" width="130" height="36" rx="6" class="btn-secondary"/>
        <text x="485" y="23" text-anchor="middle" class="text-primary" font-size="13">❓ Help</text>
      </g>
      
      <!-- Status Indicator -->
      <g transform="translate(0, 140)">
        <circle cx="8" cy="8" r="8" class="neural-primary" opacity="0.8">
          <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="24" y="13" class="text-secondary" font-size="14">Qwen CLI connected • Raspberry Pi 4</text>
      </g>
    </g>
  </g>

  <!-- Title Text -->
  <text x="400" y="365" text-anchor="middle" class="text-primary" font-size="24" font-weight="600">Arpy Assist</text>
  <text x="400" y="390" text-anchor="middle" class="text-secondary" font-size="16">Qwen CLI Web Interface • Access Anywhere</text>
</svg>
