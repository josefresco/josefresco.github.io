<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0f"/><stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Pi source -->
  <rect x="40" y="165" width="130" height="80" rx="8" fill="#0f1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="105" y="195" font-family="Inter,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Raspberry Pi</text>
  <text x="105" y="212" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">app data</text>
  <text x="105" y="226" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">/home/pi/apps/</text>

  <!-- Arrow → rsync -->
  <line x1="172" y1="205" x2="218" y2="205" stroke="#2a2d3a" stroke-width="1.5"/>
  <polygon points="214,200 222,205 214,210" fill="#2a2d3a"/>

  <!-- rsync step -->
  <rect x="222" y="178" width="110" height="54" rx="8" fill="#0f1117" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="277" y="200" font-family="monospace" font-size="11" fill="#00d4ff" text-anchor="middle">rsync</text>
  <text x="277" y="216" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">-avz --delete</text>
  <text x="277" y="228" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">SSH tunnel</text>

  <!-- Arrow → tar -->
  <line x1="334" y1="205" x2="370" y2="205" stroke="#2a2d3a" stroke-width="1.5"/>
  <polygon points="366,200 374,205 366,210" fill="#2a2d3a"/>

  <!-- tar step -->
  <rect x="374" y="178" width="110" height="54" rx="8" fill="#0f1117" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="429" y="200" font-family="monospace" font-size="11" fill="#f59e0b" text-anchor="middle">tar -czf</text>
  <text x="429" y="216" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">backup.tar.gz</text>
  <text x="429" y="228" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">compressed</text>

  <!-- Arrow → GPG -->
  <line x1="486" y1="205" x2="522" y2="205" stroke="#2a2d3a" stroke-width="1.5"/>
  <polygon points="518,200 526,205 518,210" fill="#2a2d3a"/>

  <!-- GPG encrypt step -->
  <rect x="526" y="155" width="120" height="100" rx="8" fill="#0f1117" stroke="#7c3aed" stroke-width="2"/>
  <!-- Lock icon -->
  <rect x="568" y="175" width="36" height="28" rx="4" fill="#1a1d29" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M574,175 Q574,162 586,162 Q598,162 598,175" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="586" cy="189" r="5" fill="#7c3aed"/>
  <line x1="586" y1="194" x2="586" y2="199" stroke="#7c3aed" stroke-width="2"/>
  <text x="586" y="236" font-family="monospace" font-size="10" fill="#7c3aed" text-anchor="middle">AES-256</text>
  <text x="586" y="249" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">GPG encrypt</text>

  <!-- Arrow → offsite -->
  <line x1="648" y1="205" x2="688" y2="205" stroke="#7c3aed" stroke-width="1.5"/>
  <polygon points="684,200 692,205 684,210" fill="#7c3aed"/>

  <!-- Offsite storage -->
  <rect x="692" y="165" width="70" height="80" rx="8" fill="#0f1117" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Cloud icon -->
  <ellipse cx="727" cy="195" rx="22" ry="14" fill="#1a1d29" stroke="#00d4ff" stroke-width="1.5"/>
  <ellipse cx="716" cy="200" rx="12" ry="10" fill="#1a1d29" stroke="#00d4ff" stroke-width="1.5"/>
  <ellipse cx="738" cy="200" rx="12" ry="10" fill="#1a1d29" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="710" y="199" width="34" height="12" fill="#1a1d29" stroke="none"/>
  <text x="727" y="234" font-family="monospace" font-size="8" fill="#00d4ff" text-anchor="middle">offsite</text>

  <!-- Verify step below -->
  <rect x="290" y="285" width="220" height="60" rx="8" fill="#0f1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="308" font-family="Inter,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Restore Verification</text>
  <text x="400" y="326" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">gpg --decrypt | tar -xzf</text>
  <text x="400" y="340" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle">✓ checksum validated</text>

  <!-- Telegram alert -->
  <rect x="560" y="285" width="190" height="60" rx="8" fill="#0f1117" stroke="#229ED9" stroke-width="1.5"/>
  <text x="655" y="308" font-family="Inter,sans-serif" font-size="11" fill="#229ED9" text-anchor="middle" font-weight="600">Telegram Alert</text>
  <text x="655" y="326" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">✓ Backup complete</text>
  <text x="655" y="340" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">size · timestamp · hash</text>

  <text x="400" y="395" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Encrypted Offsite Backups</text>
  <text x="400" y="418" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">GPG AES-256 · Restore Verification · Pi Backups</text>
</svg>
