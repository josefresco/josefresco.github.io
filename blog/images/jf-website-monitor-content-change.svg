  <rect x="466" y="236" width="210" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="466" y="252" width="150" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="466" y="268" width="195" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="466" y="284" width="165" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="466" y="300" width="120" height="8" rx="3" fill="#2a2d3a"/>
  <!-- Second added line -->
  <rect x="466" y="316" width="240" height="16" rx="3" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1"/>
  <text x="470" y="326" font-family="monospace" font-size="9" fill="#22c55e">+ Sale ends Friday!</text>
  <rect x="466" y="340" width="145" height="8" rx="3" fill="#2a2d3a"/>

  <!-- Bottom label -->
  <text x="400" y="406" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Content Change Detection</text>
  <text x="400" y="428" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Fingerprint · Diff · Alert</text>
