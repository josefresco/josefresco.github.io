    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Left panel: BEFORE -->
  <rect x="60" y="80" width="290" height="290" rx="10" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
  <rect x="60" y="80" width="290" height="36" rx="10" fill="#1a1d29"/>
  <rect x="60" y="106" width="290" height="10" fill="#1a1d29"/>
  <circle cx="82" cy="98" r="6" fill="#ef4444"/>
  <circle cx="100" cy="98" r="6" fill="#f59e0b"/>
  <circle cx="118" cy="98" r="6" fill="#22c55e"/>
  <text x="190" y="103" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">before.html</text>

