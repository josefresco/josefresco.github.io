  <rect x="466" y="148" width="220" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="466" y="164" width="190" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="466" y="180" width="140" height="8" rx="3" fill="#2a2d3a"/>
