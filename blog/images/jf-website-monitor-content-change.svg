  <rect x="76" y="164" width="190" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="76" y="180" width="140" height="8" rx="3" fill="#2a2d3a"/>
  <!-- Highlighted "deleted" line -->
  <rect x="76" y="196" width="240" height="16" rx="3" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1" stroke-dasharray="none"/>
  <rect x="76" y="200" width="200" height="8" rx="3" fill="#ef4444" opacity="0.5"/>
  <text x="80" y="206" font-family="monospace" font-size="9" fill="#ef4444">- Price: $29/month</text>
  <rect x="76" y="220" width="180" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="76" y="236" width="210" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="76" y="252" width="150" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="76" y="268" width="195" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="76" y="284" width="165" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="76" y="300" width="120" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="76" y="316" width="175" height="8" rx="3" fill="#2a2d3a"/>
  <rect x="76" y="332" width="145" height="8" rx="3" fill="#2a2d3a"/>

  <!-- Arrow in middle -->
  <g transform="translate(395,225)">
    <circle r="28" fill="#1a1d29" stroke="#00d4ff" stroke-width="1.5"/>
