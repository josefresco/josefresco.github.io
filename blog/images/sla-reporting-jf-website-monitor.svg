<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0f"/><stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Big SLA score circle -->
  <circle cx="180" cy="195" r="105" fill="none" stroke="#1a1d29" stroke-width="14"/>
  <circle cx="180" cy="195" r="105" fill="none" stroke="#22c55e" stroke-width="14"
          stroke-dasharray="659" stroke-dashoffset="6.6"
          stroke-linecap="round" transform="rotate(-90 180 195)"/>
  <text x="180" y="183" font-family="Inter,sans-serif" font-size="40" font-weight="800" fill="white" text-anchor="middle">99.9</text>
  <text x="180" y="205" font-family="Inter,sans-serif" font-size="16" font-weight="600" fill="#22c55e" text-anchor="middle">% Uptime</text>
  <text x="180" y="224" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">30-day SLA</text>

  <!-- Right panel: stats + chart -->
  <g transform="translate(330,60)">
    <!-- Stat cards row -->
    <rect width="130" height="64" rx="8" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <text x="65" y="24" font-family="Inter,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Total Downtime</text>
    <text x="65" y="48" font-family="Inter,sans-serif" font-size="24" font-weight="700" fill="#22c55e" text-anchor="middle">43m</text>
    <text x="65" y="60" font-family="monospace" font-size="8" fill="#7689a1" text-anchor="middle">this month</text>

    <rect x="145" width="130" height="64" rx="8" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <text x="210" y="24" font-family="Inter,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Incidents</text>
    <text x="210" y="48" font-family="Inter,sans-serif" font-size="24" font-weight="700" fill="#f59e0b" text-anchor="middle">3</text>
    <text x="210" y="60" font-family="monospace" font-size="8" fill="#7689a1" text-anchor="middle">last 30 days</text>

    <rect x="290" width="130" height="64" rx="8" fill="#0f1117" stroke="#2a2d3a" stroke-width="1.5"/>
    <text x="355" y="24" font-family="Inter,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Avg Response</text>
    <text x="355" y="48" font-family="Inter,sans-serif" font-size="24" font-weight="700" fill="#00d4ff" text-anchor="middle">182ms</text>
    <text x="355" y="60" font-family="monospace" font-size="8" fill="#7689a1" text-anchor="middle">p50 latency</text>

    <!-- Uptime bar chart -->
    <text x="0" y="90" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8" font-weight="600">Daily Uptime — Last 30 Days</text>
    <g transform="translate(0,100)">
      <!-- Bars (30 days) -->
      <g fill="#22c55e" opacity="0.8">
        <rect x="0"   y="0" width="12" height="80" rx="2"/>
        <rect x="15"  y="0" width="12" height="80" rx="2"/>
        <rect x="30"  y="0" width="12" height="80" rx="2"/>
        <rect x="45"  y="0" width="12" height="80" rx="2"/>
        <rect x="60"  y="0" width="12" height="80" rx="2"/>
        <rect x="75"  y="0" width="12" height="80" rx="2"/>
        <rect x="90"  y="0" width="12" height="80" rx="2"/>
        <rect x="105" y="0" width="12" height="80" rx="2"/>
        <rect x="120" y="0" width="12" height="80" rx="2"/>
        <rect x="135" y="0" width="12" height="80" rx="2"/>
      </g>
      <!-- Incident day (partial) -->
      <rect x="150" y="22" width="12" height="58" rx="2" fill="#22c55e" opacity="0.8"/>
      <rect x="150" y="0"  width="12" height="20" rx="2" fill="#ef4444" opacity="0.8"/>
      <g fill="#22c55e" opacity="0.8">
        <rect x="165" y="0" width="12" height="80" rx="2"/>
        <rect x="180" y="0" width="12" height="80" rx="2"/>
        <rect x="195" y="0" width="12" height="80" rx="2"/>
        <rect x="210" y="0" width="12" height="80" rx="2"/>
        <rect x="225" y="0" width="12" height="80" rx="2"/>
        <rect x="240" y="0" width="12" height="80" rx="2"/>
        <rect x="255" y="0" width="12" height="80" rx="2"/>
        <rect x="270" y="0" width="12" height="80" rx="2"/>
        <rect x="285" y="0" width="12" height="80" rx="2"/>
        <rect x="300" y="0" width="12" height="80" rx="2"/>
        <rect x="315" y="0" width="12" height="80" rx="2"/>
        <rect x="330" y="0" width="12" height="80" rx="2"/>
        <rect x="345" y="0" width="12" height="80" rx="2"/>
        <rect x="360" y="0" width="12" height="80" rx="2"/>
        <rect x="375" y="0" width="12" height="80" rx="2"/>
        <rect x="390" y="0" width="12" height="80" rx="2"/>
        <rect x="405" y="0" width="12" height="80" rx="2"/>
      </g>
      <!-- X axis labels -->
      <text x="6"   y="96" font-family="monospace" font-size="7" fill="#7689a1" text-anchor="middle">1</text>
      <text x="156" y="96" font-family="monospace" font-size="7" fill="#ef4444" text-anchor="middle">11</text>
      <text x="261" y="96" font-family="monospace" font-size="7" fill="#7689a1" text-anchor="middle">18</text>
      <text x="411" y="96" font-family="monospace" font-size="7" fill="#7689a1" text-anchor="middle">28</text>
    </g>

    <!-- PDF export badge -->
    <rect x="0" y="230" width="200" height="38" rx="8" fill="#0f1117" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="100" y="249" font-family="Inter,sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle" font-weight="600">PDF Report Export</text>
    <text x="100" y="262" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">SLA compliance · client-ready</text>

    <rect x="215" y="230" width="205" height="38" rx="8" fill="#0f1117" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="317" y="249" font-family="Inter,sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" font-weight="600">Email Alerts</text>
    <text x="317" y="262" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">SLA breach · threshold notify</text>
  </g>

  <text x="400" y="393" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">SLA Reporting — JF Website Monitor</text>
  <text x="400" y="416" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Uptime Analytics · PDF Export · Incident Tracking</text>
</svg>
