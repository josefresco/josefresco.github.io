<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0f"/><stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Browser / Client -->
  <rect x="30" y="155" width="120" height="110" rx="8" fill="#0f1117" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="38" y="163" width="104" height="14" rx="3" fill="#1a1d29" stroke="#2a2d3a" stroke-width="1"/>
  <circle cx="48" cy="170" r="4" fill="#ef4444"/>
  <circle cx="60" cy="170" r="4" fill="#f59e0b"/>
  <circle cx="72" cy="170" r="4" fill="#22c55e"/>
  <rect x="38" y="183" width="104" height="72" rx="2" fill="#0a0c12"/>
  <!-- Mini dashboard preview -->
  <rect x="42" y="187" width="46" height="30" rx="2" fill="#1a1d29" stroke="#00d4ff" stroke-width="0.5"/>
  <text x="65" y="199" font-family="monospace" font-size="7" fill="#00d4ff" text-anchor="middle">72°F</text>
  <text x="65" y="210" font-family="monospace" font-size="6" fill="#94a3b8" text-anchor="middle">Sunny</text>
  <rect x="94" y="187" width="46" height="30" rx="2" fill="#1a1d29" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="117" y="199" font-family="monospace" font-size="6" fill="#7c3aed" text-anchor="middle">Calendar</text>
  <text x="117" y="210" font-family="monospace" font-size="6" fill="#94a3b8" text-anchor="middle">3 events</text>
  <rect x="42" y="222" width="98" height="28" rx="2" fill="#1a1d29" stroke="#22c55e" stroke-width="0.5"/>
  <text x="91" y="235" font-family="monospace" font-size="6" fill="#22c55e" text-anchor="middle">Weekend Preview</text>
  <text x="91" y="245" font-family="monospace" font-size="6" fill="#94a3b8" text-anchor="middle">Soccer · Dinner · Movie</text>
  <text x="90" y="276" font-family="Inter,sans-serif" font-size="10" fill="#00d4ff" text-anchor="middle" font-weight="600">Family Browser</text>

  <!-- Arrow → CF Tunnel -->
  <line x1="152" y1="210" x2="196" y2="210" stroke="#00d4ff" stroke-width="1.5"/>
  <polygon points="192,205 200,210 192,215" fill="#00d4ff"/>

  <!-- Cloudflare Tunnel + Basic Auth gate -->
  <rect x="200" y="178" width="118" height="64" rx="8" fill="#0f1117" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Lock icon -->
  <rect x="228" y="192" width="22" height="17" rx="3" fill="#1a1d29" stroke="#f59e0b" stroke-width="1.2"/>
  <path d="M232,192 Q232,184 239,184 Q246,184 246,192" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="239" cy="200" r="3" fill="#f59e0b"/>
  <line x1="239" y1="203" x2="239" y2="207" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="270" y="197" font-family="Inter,sans-serif" font-size="9" fill="#f59e0b" font-weight="600">CF Tunnel</text>
  <text x="270" y="211" font-family="monospace" font-size="8" fill="#94a3b8">Basic Auth</text>
  <text x="270" y="223" font-family="monospace" font-size="8" fill="#94a3b8">127.0.0.1:3003</text>

  <!-- Arrow → Express -->
  <line x1="320" y1="210" x2="360" y2="210" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="356,205 364,210 356,215" fill="#f59e0b"/>

  <!-- Express Server on Pi -->
  <rect x="364" y="115" width="160" height="200" rx="8" fill="#0f1117" stroke="#22c55e" stroke-width="2"/>
  <text x="444" y="138" font-family="Inter,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="700">Express · Raspberry Pi</text>
  <line x1="372" y1="145" x2="516" y2="145" stroke="#2a2d3a" stroke-width="1"/>

  <!-- Route: GET /api/config -->
  <rect x="376" y="152" width="140" height="32" rx="4" fill="#1a1d29" stroke="#00d4ff" stroke-width="1"/>
  <text x="386" y="165" font-family="monospace" font-size="8" fill="#94a3b8">GET</text>
  <text x="406" y="165" font-family="monospace" font-size="8" fill="#00d4ff">/api/config</text>
  <text x="386" y="178" font-family="monospace" font-size="7" fill="#64748b">→ zip, timezone, account names</text>

  <!-- Route: POST /api/calendar -->
  <rect x="376" y="191" width="140" height="32" rx="4" fill="#1a1d29" stroke="#7c3aed" stroke-width="1"/>
  <text x="386" y="204" font-family="monospace" font-size="8" fill="#94a3b8">POST</text>
  <text x="410" y="204" font-family="monospace" font-size="8" fill="#7c3aed">/api/calendar</text>
  <text x="386" y="217" font-family="monospace" font-size="7" fill="#64748b">accountId → server creds</text>

  <!-- Route: static -->
  <rect x="376" y="230" width="140" height="32" rx="4" fill="#1a1d29" stroke="#22c55e" stroke-width="1"/>
  <text x="386" y="243" font-family="monospace" font-size="8" fill="#94a3b8">GET</text>
  <text x="406" y="243" font-family="monospace" font-size="8" fill="#22c55e">/* static files</text>
  <text x="386" y="256" font-family="monospace" font-size="7" fill="#64748b">dashboard.html, CSS, JS</text>

  <!-- Route: setup blocked -->
  <rect x="376" y="269" width="140" height="28" rx="4" fill="#1a1d29" stroke="#ef4444" stroke-width="1"/>
  <text x="386" y="282" font-family="monospace" font-size="8" fill="#94a3b8">GET</text>
  <text x="406" y="282" font-family="monospace" font-size="8" fill="#ef4444">/setup.html → 404</text>
  <text x="386" y="292" font-family="monospace" font-size="7" fill="#64748b">setup blocked; use .env</text>

  <!-- Arrow up-right to .env -->
  <line x1="524" y1="175" x2="566" y2="130" stroke="#00d4ff" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="561,126 569,128 565,136" fill="#00d4ff"/>

  <!-- .env credentials box -->
  <rect x="570" y="80" width="192" height="112" rx="8" fill="#0f1117" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="666" y="100" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="600">.env (server only)</text>
  <line x1="578" y1="107" x2="754" y2="107" stroke="#2a2d3a" stroke-width="1"/>
  <text x="582" y="121" font-family="monospace" font-size="8" fill="#94a3b8">OPENWEATHER_API_KEY=•••</text>
  <text x="582" y="134" font-family="monospace" font-size="8" fill="#94a3b8">CALDAV_ACCOUNT_1_PASSWORD=•••</text>
  <text x="582" y="147" font-family="monospace" font-size="8" fill="#94a3b8">CALDAV_ACCOUNT_2_PASSWORD=•••</text>
  <text x="582" y="160" font-family="monospace" font-size="8" fill="#94a3b8">DASHBOARD_PASSWORD=•••</text>
  <text x="582" y="173" font-family="monospace" font-size="8" fill="#64748b">never sent to browser</text>
  <text x="582" y="184" font-family="monospace" font-size="8" fill="#64748b">LOCATION_ZIP + TIMEZONE</text>

  <!-- Arrow down-right to CalDAV -->
  <line x1="524" y1="215" x2="566" y2="270" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="562,265 570,271 562,276" fill="#7c3aed"/>

  <!-- CalDAV services -->
  <rect x="570" y="272" width="192" height="100" rx="8" fill="#0f1117" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="666" y="292" font-family="Inter,sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle" font-weight="600">CalDAV Services</text>
  <line x1="578" y1="299" x2="754" y2="299" stroke="#2a2d3a" stroke-width="1"/>
  <text x="582" y="316" font-family="monospace" font-size="9" fill="#94a3b8">Google Calendar</text>
  <text x="748" y="316" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="end">apidata.google…</text>
  <text x="582" y="333" font-family="monospace" font-size="9" fill="#94a3b8">iCloud Calendar</text>
  <text x="748" y="333" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="end">caldav.icloud.com</text>
  <text x="582" y="350" font-family="monospace" font-size="9" fill="#94a3b8">Generic CalDAV</text>
  <text x="748" y="350" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="end">any server</text>
  <text x="582" y="364" font-family="monospace" font-size="8" fill="#64748b">up to 3 accounts · server-side auth</text>

  <!-- Title -->
  <text x="400" y="400" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Family Dashboard v3.31 · Self-Hosted on Raspberry Pi</text>
  <text x="400" y="425" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Express · HTTP Basic Auth · Server-Side Credentials · Cloudflare Tunnel</text>
</svg>
