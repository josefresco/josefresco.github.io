<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d29;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="piGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c51a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b1538;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(26,29,41,0.95);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(42,45,58,0.95);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.12">
    <circle cx="80" cy="80" r="2" fill="#00d4ff"/>
    <circle cx="200" cy="50" r="2" fill="#7c3aed"/>
    <circle cx="600" cy="80" r="2" fill="#c51a4a"/>
    <circle cx="720" cy="50" r="2" fill="#f59e0b"/>
    <circle cx="80" cy="550" r="2" fill="#7c3aed"/>
    <circle cx="720" cy="550" r="2" fill="#00d4ff"/>
    <circle cx="400" cy="30" r="2" fill="#22c55e"/>
  </g>

  <!-- Title area -->
  <text x="400" y="60" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700" fill="white" text-anchor="middle">Pi Backups</text>
  <text x="400" y="90" font-family="Inter, Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Automated Offsite Backup for Raspberry Pi</text>

  <!-- Status badge -->
  <g transform="translate(310, 108)">
    <rect x="0" y="0" width="180" height="28" rx="14" fill="url(#greenGradient)" filter="url(#glow)"/>
    <text x="90" y="19" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">✓ Automated &amp; Scheduled</text>
  </g>

  <!-- Raspberry Pi box (left) -->
  <g transform="translate(60, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="240" rx="12" fill="url(#cardGradient)" stroke="rgba(197,26,74,0.4)" stroke-width="1.5"/>
    <!-- Pi board -->
    <rect x="20" y="20" width="160" height="100" rx="8" fill="url(#piGradient)" opacity="0.9"/>
    <circle cx="40" cy="40" r="8" fill="rgba(255,255,255,0.2)"/>
    <circle cx="160" cy="40" r="8" fill="rgba(255,255,255,0.2)"/>
    <rect x="55" y="55" width="90" height="40" rx="4" fill="rgba(255,255,255,0.1)"/>
    <!-- GPIO pins -->
    <g fill="rgba(255,255,255,0.6)">
      <rect x="25" y="100" width="4" height="8" rx="1"/>
      <rect x="33" y="100" width="4" height="8" rx="1"/>
      <rect x="41" y="100" width="4" height="8" rx="1"/>
      <rect x="49" y="100" width="4" height="8" rx="1"/>
      <rect x="57" y="100" width="4" height="8" rx="1"/>
      <rect x="65" y="100" width="4" height="8" rx="1"/>
    </g>
    <text x="100" y="145" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Raspberry Pi</text>
    <!-- App data -->
    <rect x="15" y="165" width="170" height="60" rx="6" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="100" y="182" font-family="Inter, Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Applications &amp; Data</text>
    <text x="30" y="200" font-family="Monaco, monospace" font-size="9" fill="#67e8f9">/home/pi/apps/</text>
    <text x="30" y="214" font-family="Monaco, monospace" font-size="9" fill="#67e8f9">/etc/configs/</text>
  </g>

  <!-- Shell script terminal (center) -->
  <g transform="translate(270, 190)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="220" rx="10" fill="url(#cardGradient)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
    <!-- Terminal header -->
    <rect x="0" y="0" width="260" height="36" rx="10" fill="rgba(0,212,255,0.08)"/>
    <rect x="0" y="24" width="260" height="12" fill="url(#cardGradient)"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="52" cy="18" r="5" fill="#27c93f"/>
    <text x="130" y="22" font-family="Inter, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">backup.sh</text>
    <!-- Terminal content -->
    <text x="16" y="58" font-family="Monaco, monospace" font-size="10" fill="#4ade80">#!/bin/bash</text>
    <text x="16" y="74" font-family="Monaco, monospace" font-size="10" fill="#64748b"># Offsite Pi Backup Script</text>
    <text x="16" y="94" font-family="Monaco, monospace" font-size="10" fill="#67e8f9">DEST<text font-family="Monaco, monospace" font-size="10" fill="#94a3b8">="user@remote:/backups"</text></text>
    <text x="16" y="110" font-family="Monaco, monospace" font-size="10" fill="#67e8f9">DATE<text font-family="Monaco, monospace" font-size="10" fill="#94a3b8">=$(date +%Y-%m-%d)</text></text>
    <text x="16" y="130" font-family="Monaco, monospace" font-size="10" fill="#a78bfa">rsync <text font-family="Monaco, monospace" font-size="10" fill="#94a3b8">-avz --delete \</text></text>
    <text x="28" y="146" font-family="Monaco, monospace" font-size="10" fill="#94a3b8">  /home/pi/apps/ \</text>
    <text x="28" y="162" font-family="Monaco, monospace" font-size="10" fill="#94a3b8">  $DEST/$DATE/</text>
    <text x="16" y="182" font-family="Monaco, monospace" font-size="10" fill="#a78bfa">echo <text font-family="Monaco, monospace" font-size="10" fill="#4ade80">"Backup complete ✓"</text></text>
    <!-- Cron badge -->
    <rect x="16" y="198" width="228" height="14" rx="4" fill="rgba(124,58,237,0.1)"/>
    <text x="130" y="209" font-family="Monaco, monospace" font-size="9" fill="#a78bfa" text-anchor="middle">0 2 * * * /home/pi/backup.sh</text>
  </g>

  <!-- Remote server / cloud (right) -->
  <g transform="translate(540, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="240" rx="12" fill="url(#cardGradient)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
    <!-- Server icon -->
    <rect x="30" y="20" width="140" height="30" rx="6" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <circle cx="50" cy="35" r="5" fill="#22c55e"/>
    <text x="70" y="39" font-family="Inter, Arial, sans-serif" font-size="11" fill="#86efac">Remote Server</text>
    <rect x="30" y="58" width="140" height="30" rx="6" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <circle cx="50" cy="73" r="5" fill="#22c55e"/>
    <text x="70" y="77" font-family="Inter, Arial, sans-serif" font-size="11" fill="#86efac">Backup Store</text>
    <!-- Backup snapshots -->
    <text x="100" y="115" font-family="Inter, Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Snapshots</text>
    <rect x="20" y="122" width="160" height="22" rx="4" fill="rgba(34,197,94,0.1)"/>
    <text x="30" y="137" font-family="Monaco, monospace" font-size="9" fill="#4ade80">2026-03-22/ ✓</text>
    <rect x="20" y="148" width="160" height="22" rx="4" fill="rgba(34,197,94,0.07)"/>
    <text x="30" y="163" font-family="Monaco, monospace" font-size="9" fill="#4ade80">2026-03-21/ ✓</text>
    <rect x="20" y="174" width="160" height="22" rx="4" fill="rgba(34,197,94,0.04)"/>
    <text x="30" y="189" font-family="Monaco, monospace" font-size="9" fill="#86efac">2026-03-20/ ✓</text>
    <!-- Encrypted label -->
    <rect x="30" y="210" width="140" height="24" rx="12" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="100" y="226" font-family="Inter, Arial, sans-serif" font-size="10" fill="#67e8f9" text-anchor="middle">🔒 SSH Encrypted Transfer</text>
  </g>

  <!-- Arrows between boxes -->
  <line x1="262" y1="300" x2="268" y2="300" stroke="#00d4ff" stroke-width="2" opacity="0.8" marker-end="url(#arrowhead)"/>
  <line x1="220" y1="300" x2="268" y2="300" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6,3" opacity="0.7" marker-end="url(#arrowhead)"/>
  <line x1="532" y1="300" x2="538" y2="300" stroke="#22c55e" stroke-width="2" opacity="0.8" marker-end="url(#arrowhead)"/>
  <line x1="530" y1="300" x2="540" y2="300" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3" opacity="0.7" marker-end="url(#arrowhead)"/>

  <!-- Feature pills at bottom -->
  <g transform="translate(60, 450)">
    <rect x="0" y="0" width="130" height="26" rx="13" fill="rgba(197,26,74,0.1)" stroke="rgba(197,26,74,0.3)" stroke-width="1"/>
    <text x="65" y="17" font-family="Inter, Arial, sans-serif" font-size="10" fill="#f87171" text-anchor="middle">🥧 Raspberry Pi</text>
  </g>
  <g transform="translate(200, 450)">
    <rect x="0" y="0" width="130" height="26" rx="13" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
    <text x="65" y="17" font-family="Inter, Arial, sans-serif" font-size="10" fill="#67e8f9" text-anchor="middle">💻 Shell / Bash</text>
  </g>
  <g transform="translate(340, 450)">
    <rect x="0" y="0" width="130" height="26" rx="13" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
    <text x="65" y="17" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">⚙️ rsync + cron</text>
  </g>
  <g transform="translate(480, 450)">
    <rect x="0" y="0" width="130" height="26" rx="13" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
    <text x="65" y="17" font-family="Inter, Arial, sans-serif" font-size="10" fill="#4ade80" text-anchor="middle">☁️ Offsite Storage</text>
  </g>
  <g transform="translate(620, 450)">
    <rect x="0" y="0" width="120" height="26" rx="13" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="60" y="17" font-family="Inter, Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">🔒 SSH Secure</text>
  </g>

  <!-- Decorative circles -->
  <circle cx="50" cy="500" r="3" fill="#c51a4a" opacity="0.4"/>
  <circle cx="750" cy="160" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="750" cy="500" r="2" fill="#00d4ff" opacity="0.4"/>
</svg>
