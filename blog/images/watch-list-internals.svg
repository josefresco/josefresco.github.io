<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0f"/><stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="680" cy="80" r="100" fill="#00d4ff" opacity="0.04"/>

  <!-- build.js box -->
  <rect x="40" y="130" width="160" height="110" rx="10" fill="#0f1117" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="155" font-family="monospace" font-size="12" fill="#f59e0b" text-anchor="middle">build.js</text>
  <rect x="55" y="162" width="130" height="8" rx="3" fill="#2a2d3a"/>
  <text x="55" y="183" font-family="monospace" font-size="8" fill="#94a3b8">const token =</text>
  <text x="55" y="195" font-family="monospace" font-size="8" fill="#22c55e">  process.env.TMDB</text>
  <text x="55" y="207" font-family="monospace" font-size="8" fill="#94a3b8">inject(html, token)</text>
  <text x="120" y="228" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Build-time secret injection</text>

  <!-- Arrow: build.js → single file -->
  <line x1="202" y1="185" x2="258" y2="185" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="254,180 262,185 254,190" fill="#f59e0b"/>

  <!-- Single HTML file (centre-left) -->
  <rect x="262" y="120" width="170" height="130" rx="10" fill="#0f1117" stroke="#00d4ff" stroke-width="2"/>
  <rect x="262" y="120" width="170" height="28" rx="10" fill="#1a1d29"/>
  <rect x="262" y="136" width="170" height="12" fill="#1a1d29"/>
  <text x="347" y="138" font-family="monospace" font-size="10" fill="#00d4ff" text-anchor="middle">watch-list.html</text>
  <text x="347" y="162" font-family="Inter,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="600">Single File PWA</text>
  <text x="347" y="178" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">&lt;!-- HTML + CSS + JS --&gt;</text>
  <text x="347" y="193" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">embedded token</text>
  <text x="347" y="208" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">service worker reg</text>
  <text x="347" y="225" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle">manifest · offline · installable</text>

  <!-- Arrow up: → TMDB API -->
  <line x1="432" y1="165" x2="490" y2="140" stroke="#2a2d3a" stroke-width="1.5"/>
  <polygon points="486,135 494,139 488,145" fill="#2a2d3a"/>

  <!-- TMDB API box -->
  <rect x="494" y="90" width="155" height="80" rx="10" fill="#0f1117" stroke="#01b4e4" stroke-width="1.5"/>
  <text x="571" y="115" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#01b4e4" text-anchor="middle">TMDB API</text>
  <text x="571" y="133" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">search · details</text>
  <text x="571" y="148" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">session auth · lists</text>
  <text x="571" y="163" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle">v3/4 endpoints</text>

  <!-- Arrow down: → Session auth -->
  <line x1="432" y1="195" x2="490" y2="220" stroke="#2a2d3a" stroke-width="1.5"/>
  <polygon points="486,216 494,220 487,226" fill="#2a2d3a"/>

  <!-- Session auth box -->
  <rect x="494" y="200" width="155" height="70" rx="10" fill="#0f1117" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="571" y="222" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="#7c3aed" text-anchor="middle">Session Auth</text>
  <text x="571" y="240" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">request_token</text>
  <text x="571" y="255" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">session_id → persist</text>

  <!-- Arrow right: → PWA on device -->
  <line x1="651" y1="185" x2="700" y2="185" stroke="#00d4ff" stroke-width="1.5"/>
  <polygon points="696,180 704,185 696,190" fill="#00d4ff"/>

  <!-- Phone mockup -->
  <rect x="704" y="100" width="72" height="130" rx="10" fill="#0f1117" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="712" y="112" width="56" height="85" rx="4" fill="#1a1d29"/>
  <circle cx="740" cy="220" r="5" fill="#2a2d3a"/>
  <!-- Screen content -->
  <rect x="716" y="116" width="48" height="8" rx="2" fill="#00d4ff" opacity="0.5"/>
  <rect x="716" y="128" width="48" height="30" rx="3" fill="#2a2d3a"/>
  <rect x="718" y="130" width="20" height="20" rx="2" fill="#1a1d29"/>
  <rect x="742" y="130" width="20" height="5" rx="1" fill="#3a3d4a"/>
  <rect x="742" y="138" width="16" height="4" rx="1" fill="#2a2d3a"/>
  <rect x="716" y="162" width="48" height="30" rx="3" fill="#2a2d3a"/>
  <rect x="716" y="195" width="30" height="6" rx="3" fill="#7c3aed" opacity="0.6"/>

  <text x="400" y="393" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Watch List Internals</text>
  <text x="400" y="416" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Single-File PWA · Build-Time Injection · TMDB Session Auth</text>
</svg>
