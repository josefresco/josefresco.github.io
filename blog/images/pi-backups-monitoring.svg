<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0f"/><stop offset="100%" stop-color="#1a1d29"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Pi source -->
  <rect x="30" y="155" width="120" height="75" rx="8" fill="#0f1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="90" y="183" font-family="Inter,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Raspberry Pi</text>
  <text x="90" y="200" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">backup.sh</text>
  <text x="90" y="215" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">2:00 AM cron</text>

  <!-- Arrow to archive -->
  <line x1="152" y1="193" x2="198" y2="193" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="194,188 202,193 194,198" fill="#22c55e"/>

  <!-- Encrypted archive -->
  <rect x="202" y="155" width="120" height="75" rx="8" fill="#0f1117" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="262" y="183" font-family="Inter,sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="600">Archive</text>
  <text x="262" y="200" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">backup.tar.gz.gpg</text>
  <text x="262" y="215" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">offsite server</text>

  <!-- Arrow to healthcheck -->
  <line x1="324" y1="193" x2="370" y2="193" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="366,188 374,193 366,198" fill="#00d4ff"/>

  <!-- Healthcheck block -->
  <rect x="374" y="135" width="130" height="115" rx="8" fill="#0f1117" stroke="#00d4ff" stroke-width="2"/>
  <!-- Clock icon -->
  <circle cx="439" cy="167" r="16" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="439" y1="156" x2="439" y2="167" stroke="#00d4ff" stroke-width="1.5"/>
  <line x1="439" y1="167" x2="447" y2="172" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="439" cy="167" r="2" fill="#00d4ff"/>
  <text x="439" y="198" font-family="Inter,sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">healthcheck.sh</text>
  <text x="439" y="215" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">24h dead-man</text>
  <text x="439" y="230" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">3:00 AM cron</text>

  <!-- Arrow to Telegram (success path, right) -->
  <line x1="504" y1="193" x2="550" y2="193" stroke="#229ED9" stroke-width="1.5"/>
  <polygon points="546,188 554,193 546,198" fill="#229ED9"/>

  <!-- Telegram alert block -->
  <rect x="554" y="155" width="130" height="75" rx="8" fill="#0f1117" stroke="#229ED9" stroke-width="1.5"/>
  <!-- Telegram plane icon -->
  <polygon points="619,174 601,182 608,197 625,182" fill="none" stroke="#229ED9" stroke-width="1.5"/>
  <line x1="608" y1="197" x2="612" y2="188" stroke="#229ED9" stroke-width="1.5"/>
  <text x="619" y="215" font-family="Inter,sans-serif" font-size="10" fill="#229ED9" text-anchor="middle">Telegram</text>
  <text x="619" y="228" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle">⚠ backup overdue</text>

  <!-- Retention.sh block (bottom left) -->
  <rect x="30" y="300" width="200" height="80" rx="8" fill="#0f1117" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="130" y="325" font-family="Inter,sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="600">retention.sh</text>
  <text x="130" y="342" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">prune archives &gt; 30d</text>
  <text x="130" y="358" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">Sunday 3:30 AM cron</text>
  <!-- Arrow from archive down to retention -->
  <line x1="262" y1="232" x2="262" y2="270" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="262" y1="270" x2="175" y2="298" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="172,294 178,302 180,292" fill="#f59e0b"/>

  <!-- Recover.sh block (bottom right) -->
  <rect x="460" y="300" width="200" height="80" rx="8" fill="#0f1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="560" y="325" font-family="Inter,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">recover.sh</text>
  <text x="560" y="342" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">decrypt → unpack</text>
  <text x="560" y="358" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle">✓ drill passed</text>
  <!-- Arrow from archive down to recover -->
  <line x1="262" y1="232" x2="262" y2="270" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="262" y1="270" x2="510" y2="298" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="507,294 513,302 515,292" fill="#22c55e"/>

  <text x="400" y="408" font-family="Inter,sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">Pi Backups: Monitoring &amp; Recovery</text>
  <text x="400" y="430" font-family="Inter,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Healthcheck · Retention Pruning · Recovery Drills</text>
</svg>
